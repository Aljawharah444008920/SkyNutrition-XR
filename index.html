<<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SkyNutrition XR — Premium Demo</title>

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://unpkg.com/aframe-troika-text/dist/aframe-troika-text.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    :root {
      --bg1: #07111f;
      --bg2: #0a1c33;
      --card: rgba(10, 19, 37, 0.82);
      --stroke: rgba(125, 211, 252, 0.18);
      --text: #f8fbff;
      --muted: #b8d7ff;
      --accent1: #59c3ff;
      --accent2: #3b82f6;
      --accent3: #7c3aed;
    }

    * {
      box-sizing: border-box;
      font-family: "Inter", sans-serif;
    }

    body {
      margin: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 0%, #153a68 0%, #0a1830 38%, #050c18 100%);
    }

    .overlay {
      position: fixed;
      top: 18px;
      left: 18px;
      width: 390px;
      padding: 20px;
      border-radius: 26px;
      background: linear-gradient(180deg, rgba(9,18,36,0.9), rgba(6,12,24,0.88));
      border: 1px solid var(--stroke);
      box-shadow:
        0 18px 48px rgba(0,0,0,0.38),
        inset 0 1px 0 rgba(255,255,255,0.04);
      backdrop-filter: blur(14px);
      color: var(--text);
      z-index: 20;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: #cce7ff;
      background: linear-gradient(90deg, rgba(59,130,246,.22), rgba(124,58,237,.18));
      border: 1px solid rgba(125, 211, 252, 0.12);
    }

    .overlay h1 {
      margin: 14px 0 10px;
      font-size: 54px;
      line-height: 0.95;
      letter-spacing: -2px;
      font-weight: 800;
    }

    .overlay .sub {
      margin: 0;
      font-size: 17px;
      line-height: 1.55;
      color: #dbeafe;
      max-width: 320px;
    }

    .panel {
      margin-top: 18px;
      padding: 14px;
      border-radius: 18px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
    }

    .row-note {
      margin-top: 12px;
      color: #8fc5ff;
      font-size: 13px;
      line-height: 1.45;
    }

    input, button {
      width: 100%;
      border: none;
      border-radius: 14px;
      font-size: 16px;
    }

    input {
      margin-top: 4px;
      padding: 13px;
      background: #ffffff;
      color: #111827;
    }

    button {
      margin-top: 10px;
      padding: 14px;
      font-weight: 700;
      color: white;
      cursor: pointer;
      transition: transform .18s ease, box-shadow .18s ease, opacity .18s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    .primary {
      background: linear-gradient(90deg, #66d9ff, #3b82f6);
      box-shadow: 0 14px 28px rgba(59,130,246,0.30);
    }

    .secondary {
      background: linear-gradient(90deg, #23334c, #334155);
    }

    .status-chip {
      margin-top: 12px;
      padding: 10px 12px;
      border-radius: 12px;
      font-size: 13px;
      color: #d8ecff;
      background: rgba(89,195,255,0.08);
      border: 1px solid rgba(89,195,255,0.12);
    }
  </style>
</head>
<body>

<div class="overlay" id="overlayUI">
  <div class="pill">Premium XR Judge Demo</div>
  <h1>SkyNutrition XR</h1>
  <p class="sub">
    AI-powered inflight meal scan experience with a cleaner XR journey designed for live judging.
  </p>

  <div class="panel">
    <input type="file" id="imageInput" accept="image/*" />
    <button class="primary" onclick="prepareAnalysis()">Analyze & Prepare XR</button>
    <button class="secondary" onclick="enterVRMode()">Enter XR</button>

    <div class="status-chip" id="prepareState">
      Waiting for meal image.
    </div>
  </div>

  <div class="row-note">
    Best flow: upload image → analyze → enter XR → start scan.
  </div>
</div>

<a-scene renderer="colorManagement: true" background="color: #060d18">

  <!-- Camera -->
  <a-entity position="0 1.6 0">
    <a-camera>
      <a-cursor
        color="#7dd3fc"
        fuse="true"
        fuse-timeout="900"
        raycaster="objects: .clickable">
      </a-cursor>
    </a-camera>
  </a-entity>

  <!-- Background -->
  <a-sky color="#060d18"></a-sky>
  <a-plane position="0 3 -7" width="22" height="10" color="#0c203f" opacity="0.26"></a-plane>
  <a-plane position="-5 2 -6.5" width="3.4" height="6.5" color="#0f2a54" opacity="0.09"></a-plane>
  <a-plane position="5 2 -6.5" width="3.4" height="6.5" color="#0f2a54" opacity="0.09"></a-plane>

  <!-- Floor -->
  <a-plane position="0 0 -4.2" rotation="-90 0 0" width="12" height="5.5" color="#08111d"></a-plane>
  <a-plane position="0 0.01 -4.2" rotation="-90 0 0" width="0.08" height="4.2" color="#66d9ff" opacity="0.65"></a-plane>

  <!-- Airplane -->
  <a-entity position="-5.6 2.5 -5.2"
            animation="property: position; to: 5.6 2.8 -5.2; dur: 6200; easing: linear; loop: true">
    <a-cylinder position="0 0 0" radius="0.11" height="1.25" rotation="90 0 0" color="#ffffff"></a-cylinder>
    <a-box position="0 0 0" width="1.28" height="0.04" depth="0.22" color="#8dc6ff"></a-box>
    <a-box position="0 0 -0.43" width="0.35" height="0.03" depth="0.08" color="#8dc6ff"></a-box>
    <a-box position="0 0.18 -0.43" width="0.08" height="0.22" depth="0.04" color="#8dc6ff"></a-box>
    <a-sphere position="0 0 0.62" radius="0.11" color="#ffffff"></a-sphere>
  </a-entity>

  <!-- Logo strip -->
  <a-plane position="0 2.96 -2.7" width="4.05" height="0.88" color="#0e2448" opacity="0.96"></a-plane>
  <a-plane position="0 3.29 -2.67" width="3.45" height="0.045" color="#77c6ff" opacity="0.95"></a-plane>

  <a-plane position="-1.08 2.90 -2.66" width="1.55" height="0.47" color="#ffffff"></a-plane>
  <a-image src="assets/saudi.png" position="-1.08 2.90 -2.65" width="1.40" height="0.27"></a-image>

  <a-plane position="0 2.90 -2.64" width="0.018" height="0.60" color="#8cccff" opacity="0.7"></a-plane>

  <a-plane position="1.08 2.90 -2.66" width="1.55" height="0.47" color="#ffffff"></a-plane>
  <a-image src="assets/kacst.png" position="1.08 2.90 -2.65" width="1.40" height="0.36"></a-image>

  <!-- Main glass card -->
  <a-plane id="mainPanel"
           position="0 1.18 -2.28"
           width="2.95"
           height="1.82"
           color="#0b1930"
           opacity="0.98"
           animation="property: scale; from: 0.85 0.85 0.85; to: 1 1 1; dur: 850; easing: easeOutCubic">
  </a-plane>

  <a-plane position="0 1.90 -2.25" width="2.48" height="0.055" color="#6ec8ff" opacity="0.95"></a-plane>

  <!-- Title -->
  <a-entity troika-text="
      value: SkyNutrition XR;
      position: 0 1.60 -2.20;
      align: center;
      color: #ffffff;
      fontSize: 0.13;
      font: https://cdn.jsdelivr.net/npm/@fontsource/orbitron/files/orbitron-latin-700-normal.woff;
      maxWidth: 2.2;">
  </a-entity>

  <a-entity troika-text="
      value: Premium inflight meal scan;
      position: 0 1.40 -2.20;
      align: center;
      color: #8fd3ff;
      fontSize: 0.055;
      font: https://cdn.jsdelivr.net/npm/@fontsource/orbitron/files/orbitron-latin-500-normal.woff;
      maxWidth: 1.95;">
  </a-entity>

  <!-- Start button -->
  <a-plane id="startScanBtn"
           position="0 1.05 -2.18"
           width="1.35"
           height="0.30"
           color="#2f6ef0"
           class="clickable">
  </a-plane>

  <a-entity troika-text="
      value: Start Scan;
      position: 0 1.05 -2.12;
      align: center;
      color: #ffffff;
      fontSize: 0.07;
      font: https://cdn.jsdelivr.net/npm/@fontsource/inter/files/inter-latin-700-normal.woff;
      maxWidth: 1.2;">
  </a-entity>

  <!-- Scan visuals -->
  <a-ring id="scanRing"
          position="0 0.64 -2.16"
          radius-inner="0.17"
          radius-outer="0.25"
          color="#00d4ff"
          visible="false"
          animation="property: rotation; to: 0 0 360; loop: true; dur: 850">
  </a-ring>

  <a-ring id="scanRing2"
          position="0 0.64 -2.165"
          radius-inner="0.28"
          radius-outer="0.31"
          color="#8fd3ff"
          opacity="0.45"
          visible="false"
          animation="property: scale; from: 0.8 0.8 0.8; to: 1.12 1.12 1.12; dir: alternate; dur: 550; loop: true">
  </a-ring>

  <a-plane id="scanBeam"
           position="0 0.64 -2.15"
           width="0.08"
           height="0.50"
           color="#67e8f9"
           opacity="0.0"
           visible="false"
           animation="property: opacity; from: 0.0; to: 0.28; dir: alternate; dur: 240; loop: true">
  </a-plane>

  <!-- State -->
  <a-entity id="scanStateText"
    troika-text="
      value: Ready for scan;
      position: 0 0.16 -2.14;
      align: center;
      color: #eaf6ff;
      fontSize: 0.06;
      font: https://cdn.jsdelivr.net/npm/@fontsource/inter/files/inter-latin-600-normal.woff;
      maxWidth: 1.8;">
  </a-entity>

  <!-- Result card -->
  <a-plane id="resultCard"
           position="0 -0.50 -2.18"
           width="2.52"
           height="0.94"
           color="#08101b"
           opacity="0.98"
           visible="false">
  </a-plane>

  <a-entity id="mealText"
    troika-text="
      value: ;
      position: 0 -0.18 -2.12;
      align: center;
      color: #ffffff;
      fontSize: 0.10;
      font: https://cdn.jsdelivr.net/npm/@fontsource/orbitron/files/orbitron-latin-700-normal.woff;
      maxWidth: 1.9;
      visible: false;">
  </a-entity>

  <a-entity id="metricsText"
    troika-text="
      value: ;
      position: 0 -0.66 -2.12;
      align: center;
      color: #86d6ff;
      fontSize: 0.058;
      font: https://cdn.jsdelivr.net/npm/@fontsource/inter/files/inter-latin-600-normal.woff;
      maxWidth: 1.85;
      visible: false;">
  </a-entity>

  <!-- Action buttons -->
  <a-plane id="detailsBtn"
           position="-0.58 -1.16 -2.16"
           width="0.95"
           height="0.21"
           color="#1d4ed8"
           visible="false"
           class="clickable">
  </a-plane>
  <a-entity id="detailsBtnText"
    troika-text="
      value: AI Details;
      position: -0.58 -1.16 -2.10;
      align: center;
      color: #ffffff;
      fontSize: 0.047;
      font: https://cdn.jsdelivr.net/npm/@fontsource/inter/files/inter-latin-700-normal.woff;
      maxWidth: 0.8;
      visible: false;">
  </a-entity>

  <a-plane id="againBtn"
           position="0.58 -1.16 -2.16"
           width="0.95"
           height="0.21"
           color="#16a34a"
           visible="false"
           class="clickable">
  </a-plane>
  <a-entity id="againBtnText"
    troika-text="
      value: Scan Again;
      position: 0.58 -1.16 -2.10;
      align: center;
      color: #ffffff;
      fontSize: 0.047;
      font: https://cdn.jsdelivr.net/npm/@fontsource/inter/files/inter-latin-700-normal.woff;
      maxWidth: 0.85;
      visible: false;">
  </a-entity>

  <!-- Details card -->
  <a-plane id="detailsCard"
           position="0 -1.72 -2.22"
           width="2.52"
           height="0.48"
           color="#050c15"
           visible="false">
  </a-plane>

  <a-entity id="detailsText"
    troika-text="
      value: ;
      position: 0 -1.73 -2.16;
      align: center;
      color: #9dd6ff;
      fontSize: 0.050;
      font: https://cdn.jsdelivr.net/npm/@fontsource/inter/files/inter-latin-500-normal.woff;
      maxWidth: 1.9;
      visible: false;">
  </a-entity>

</a-scene>

<script>
  const API_KEY = "AIzaSyD6CJ45RiftcqFDNjIjskTKk2PiHWZ_TPQ";

  let preparedAnalysis = null;

  const overlayUI = document.getElementById("overlayUI");
  const prepareState = document.getElementById("prepareState");

  const startScanBtn = document.getElementById("startScanBtn");
  const scanRing = document.getElementById("scanRing");
  const scanRing2 = document.getElementById("scanRing2");
  const scanBeam = document.getElementById("scanBeam");

  const scanStateText = document.getElementById("scanStateText");
  const resultCard = document.getElementById("resultCard");
  const mealText = document.getElementById("mealText");
  const metricsText = document.getElementById("metricsText");

  const detailsBtn = document.getElementById("detailsBtn");
  const detailsBtnText = document.getElementById("detailsBtnText");
  const againBtn = document.getElementById("againBtn");
  const againBtnText = document.getElementById("againBtnText");

  const detailsCard = document.getElementById("detailsCard");
  const detailsText = document.getElementById("detailsText");

  function setStateText(value) {
    scanStateText.setAttribute("troika-text", `value: ${value}; position: 0 0.16 -2.14; align: center; color: #eaf6ff; fontSize: 0.06; font: https://cdn.jsdelivr.net/npm/@fontsource/inter/files/inter-latin-600-normal.woff; maxWidth: 1.8;`);
  }

  function setMealText(value) {
    mealText.setAttribute("troika-text", `value: ${value}; position: 0 -0.18 -2.12; align: center; color: #ffffff; fontSize: 0.10; font: https://cdn.jsdelivr.net/npm/@fontsource/orbitron/files/orbitron-latin-700-normal.woff; maxWidth: 1.9; visible: true;`);
  }

  function setMetricsText(value) {
    metricsText.setAttribute("troika-text", `value: ${value}; position: 0 -0.66 -2.12; align: center; color: #86d6ff; fontSize: 0.058; font: https://cdn.jsdelivr.net/npm/@fontsource/inter/files/inter-latin-600-normal.woff; maxWidth: 1.85; visible: true;`);
  }

  function setDetailsText(value) {
    detailsText.setAttribute("troika-text", `value: ${value}; position: 0 -1.73 -2.16; align: center; color: #9dd6ff; fontSize: 0.050; font: https://cdn.jsdelivr.net/npm/@fontsource/inter/files/inter-latin-500-normal.woff; maxWidth: 1.9; visible: true;`);
  }

  async function prepareAnalysis() {
    const file = document.getElementById("imageInput").files[0];

    if (!file) {
      alert("Please choose an image first.");
      return;
    }

    prepareState.textContent = "Preparing AI analysis...";
    setStateText("Preparing AI analysis...");
    hideResultSections();

    try {
      const base64 = await toBase64(file);

      const res = await fetch(`https://vision.googleapis.com/v1/images:annotate?key=${API_KEY}`, {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
          requests: [{
            image: { content: base64 },
            features: [{ type: "LABEL_DETECTION", maxResults: 5 }]
          }]
        })
      });

      const data = await res.json();

      if (!res.ok) {
        prepareState.textContent = "AI preparation failed.";
        setStateText("AI preparation failed");
        alert(data.error?.message || "Vision API error");
        return;
      }

      const labels = data?.responses?.[0]?.labelAnnotations || [];

      if (!labels.length) {
        prepareState.textContent = "No meal detected.";
        setStateText("No meal detected");
        alert("No labels found. Try another image.");
        return;
      }

      const mealData = inferMealData(labels.map(l => l.description));
      const labelsText = labels
        .slice(0, 4)
        .map((l, i) => `${i + 1}. ${l.description} (${Math.round((l.score || 0) * 100)}%)`)
        .join("\n");

      preparedAnalysis = {
        name: mealData.name,
        calories: mealData.calories,
        protein: mealData.protein,
        reward: mealData.reward,
        wasteRisk: mealData.wasteRisk,
        labels: labelsText
      };

      prepareState.textContent = "AI ready. Enter XR and start scan.";
      setStateText("AI ready. Enter XR and start scan.");
    } catch (err) {
      prepareState.textContent = "Request failed.";
      setStateText("Request failed");
      alert(err.message);
    }
  }

  function enterVRMode() {
    overlayUI.style.display = "none";
    const scene = document.querySelector("a-scene");
    if (scene.enterVR) {
      scene.enterVR();
    }
  }

  startScanBtn.addEventListener("click", () => {
    if (!preparedAnalysis) {
      setStateText("Please analyze first");
      return;
    }

    hideResultSections();
    startScanBtn.setAttribute("visible", false);

    scanRing.setAttribute("visible", true);
    scanRing2.setAttribute("visible", true);
    scanBeam.setAttribute("visible", true);

    setStateText("Detecting meal...");

    setTimeout(() => {
      setStateText("Analyzing nutrition...");
    }, 650);

    setTimeout(() => {
      setStateText("Calculating reward...");
    }, 1350);

    setTimeout(() => {
      scanRing.setAttribute("visible", false);
      scanRing2.setAttribute("visible", false);
      scanBeam.setAttribute("visible", false);
      showPreparedResult();
    }, 2200);
  });

  detailsBtn.addEventListener("click", () => {
    const visible = detailsCard.getAttribute("visible");
    detailsCard.setAttribute("visible", !visible);
    detailsText.setAttribute("visible", !visible);
  });

  againBtn.addEventListener("click", () => {
    hideResultSections();
    startScanBtn.setAttribute("visible", true);
    setStateText("Ready for scan");
  });

  function showPreparedResult() {
    resultCard.setAttribute("visible", true);
    mealText.setAttribute("visible", true);
    metricsText.setAttribute("visible", true);

    detailsBtn.setAttribute("visible", true);
    detailsBtnText.setAttribute("visible", true);
    againBtn.setAttribute("visible", true);
    againBtnText.setAttribute("visible", true);

    setMealText(preparedAnalysis.name);
    setMetricsText(
      `Calories: ${preparedAnalysis.calories}\nProtein: ${preparedAnalysis.protein}\nReward: ${preparedAnalysis.reward}\nRisk: ${preparedAnalysis.wasteRisk}`
    );
    setDetailsText(preparedAnalysis.labels);

    setStateText("Analysis complete");
  }

  function hideResultSections() {
    resultCard.setAttribute("visible", false);
    mealText.setAttribute("visible", false);
    metricsText.setAttribute("visible", false);

    detailsBtn.setAttribute("visible", false);
    detailsBtnText.setAttribute("visible", false);
    againBtn.setAttribute("visible", false);
    againBtnText.setAttribute("visible", false);

    detailsCard.setAttribute("visible", false);
    detailsText.setAttribute("visible", false);
  }

  function inferMealData(labels) {
    const text = labels.join(" ").toLowerCase();

    if (text.includes("rice") && (text.includes("chicken") || text.includes("meat"))) {
      return { name:"Chicken Rice", calories:"520 kcal", protein:"35g", reward:"+50 Miles", wasteRisk:"Low" };
    }
    if (text.includes("salad") || (text.includes("vegetable") && text.includes("food"))) {
      return { name:"Salad Bowl", calories:"250 kcal", protein:"10g", reward:"+35 Miles", wasteRisk:"Medium" };
    }
    if (text.includes("pasta") || text.includes("noodle")) {
      return { name:"Pasta Dish", calories:"480 kcal", protein:"18g", reward:"+40 Miles", wasteRisk:"Medium" };
    }
    if (text.includes("sandwich") || text.includes("burger")) {
      return { name:"Sandwich / Burger", calories:"560 kcal", protein:"25g", reward:"+45 Miles", wasteRisk:"Medium" };
    }
    if (text.includes("dessert") || text.includes("cake")) {
      return { name:"Dessert", calories:"320 kcal", protein:"5g", reward:"+20 Miles", wasteRisk:"High" };
    }

    return { name:"Mixed Meal", calories:"400 kcal", protein:"20g", reward:"+30 Miles", wasteRisk:"Medium" };
  }

  function toBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result.split(",")[1]);
      reader.onerror = err => reject(err);
      reader.readAsDataURL(file);
    });
  }
</script>

</body>
