<<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SkyNutrition XR</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #17305f 0%, #0a1630 38%, #050b15 100%);
    }

    .overlay {
      position: fixed;
      top: 18px;
      left: 18px;
      width: 380px;
      padding: 20px;
      border-radius: 22px;
      background: rgba(8, 18, 36, 0.9);
      color: white;
      z-index: 10;
      border: 1px solid rgba(116, 227, 255, 0.18);
      box-shadow: 0 20px 50px rgba(0,0,0,0.35);
      backdrop-filter: blur(12px);
    }

    .overlay h1 {
      margin: 0 0 10px;
      font-size: 48px;
      line-height: 0.95;
    }

    .overlay p {
      margin: 0 0 14px;
      color: #dbeafe;
      font-size: 16px;
      line-height: 1.5;
    }

    .pill {
      display: inline-block;
      margin-bottom: 12px;
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: bold;
      letter-spacing: 1px;
      text-transform: uppercase;
      background: rgba(59,130,246,0.18);
      color: #d7eeff;
    }

    .box {
      margin-top: 14px;
      padding: 14px;
      border-radius: 16px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
    }

    input, button {
      width: 100%;
      box-sizing: border-box;
      margin-top: 10px;
      padding: 13px;
      border-radius: 14px;
      border: none;
      font-size: 16px;
    }

    input {
      background: white;
      color: #111827;
    }

    button {
      font-weight: bold;
      color: white;
      cursor: pointer;
    }

    .primary {
      background: linear-gradient(90deg, #5ee7ff, #4f7cff);
    }

    .secondary {
      background: linear-gradient(90deg, #273449, #3b475e);
    }

    .status {
      margin-top: 12px;
      padding: 11px 12px;
      border-radius: 12px;
      background: rgba(116,227,255,0.07);
      border: 1px solid rgba(116,227,255,0.10);
      color: #dff3ff;
      font-size: 13px;
      min-height: 42px;
    }
  </style>
</head>
<body>

<div class="overlay" id="overlayUI">
  <div class="pill">Stable XR Demo</div>
  <h1>SkyNutrition XR</h1>
  <p>Upload a meal image, prepare the analysis, then enter XR and press Start Scan.</p>

  <div class="box">
    <input type="file" id="imageInput" accept="image/*">
    <button class="primary" onclick="prepareAnalysis()">Analyze & Prepare XR</button>
    <button class="secondary" onclick="enterXRMode()">Enter XR</button>
    <div class="status" id="prepareState">Waiting for meal image.</div>
  </div>
</div>

<a-scene background="color: #050b15">

  <!-- Camera -->
  <a-entity position="0 1.6 0">
    <a-camera>
      <a-cursor
        color="#74e3ff"
        fuse="true"
        fuse-timeout="900"
        raycaster="objects: .clickable">
      </a-cursor>
    </a-camera>
  </a-entity>

  <a-sky color="#050b15"></a-sky>

  <!-- Background -->
  <a-plane position="0 3 -7" width="22" height="10" color="#11244a" opacity="0.22"></a-plane>
  <a-plane position="-5.3 2 -6.7" width="3.6" height="6.4" color="#17305f" opacity="0.09"></a-plane>
  <a-plane position="5.3 2 -6.7" width="3.6" height="6.4" color="#17305f" opacity="0.09"></a-plane>

  <!-- Floor -->
  <a-plane position="0 0 -4.4" rotation="-90 0 0" width="13" height="5.7" color="#07111d"></a-plane>

  <!-- Airplane -->
  <a-entity position="-5.8 2.55 -5.25"
            animation="property: position; to: 5.8 2.88 -5.25; dur: 6200; easing: linear; loop: true">
    <a-cylinder position="0 0 0" radius="0.11" height="1.28" rotation="90 0 0" color="#ffffff"></a-cylinder>
    <a-box position="0 0 0" width="1.3" height="0.04" depth="0.22" color="#8dc6ff"></a-box>
    <a-box position="0 0 -0.44" width="0.36" height="0.03" depth="0.08" color="#8dc6ff"></a-box>
    <a-box position="0 0.18 -0.44" width="0.08" height="0.23" depth="0.04" color="#8dc6ff"></a-box>
    <a-sphere position="0 0 0.63" radius="0.11" color="#ffffff"></a-sphere>
  </a-entity>

  <!-- Top logos -->
  <a-plane position="0 2.95 -2.8" width="4.1" height="0.9" color="#0e2347" opacity="0.95"></a-plane>

  <a-plane position="-1.08 2.90 -2.78" width="1.55" height="0.48" color="#ffffff"></a-plane>
  <a-image src="assets/saudi.png" position="-1.08 2.90 -2.77" width="1.40" height="0.28"></a-image>

  <a-plane position="0 2.90 -2.76" width="0.02" height="0.62" color="#89d2ff" opacity="0.65"></a-plane>

  <a-plane position="1.08 2.90 -2.78" width="1.55" height="0.48" color="#ffffff"></a-plane>
  <a-image src="assets/kacst.png" position="1.08 2.90 -2.77" width="1.40" height="0.36"></a-image>

  <!-- Main XR card -->
  <a-plane id="mainPanel"
           position="0 1.35 -2.45"
           width="2.9"
           height="2.3"
           color="#0a1730"
           opacity="0.98">
  </a-plane>

  <a-plane position="0 2.15 -2.43" width="2.35" height="0.04" color="#6cd9ff" opacity="0.95"></a-plane>

  <!-- Title -->
  <a-text id="heroTitle"
          value="SkyNutrition XR"
          position="0 1.92 -2.40"
          align="center"
          color="#ffffff"
          width="3.4">
  </a-text>

  <a-text id="heroSub"
          value="Immersive meal scan"
          position="0 1.67 -2.40"
          align="center"
          color="#9edbff"
          width="2.2">
  </a-text>

  <!-- Start button -->
  <a-plane id="startScanBtn"
           class="clickable"
           position="0 1.38 -2.38"
           width="1.4"
           height="0.28"
           color="#4f7cff"
           visible="true">
  </a-plane>

  <a-text id="startScanLabel"
          value="Start Scan"
          position="0 1.38 -2.34"
          align="center"
          color="#ffffff"
          width="2.1">
  </a-text>

  <!-- Scan animation -->
  <a-ring id="scanRing"
          position="0 0.82 -2.35"
          radius-inner="0.18"
          radius-outer="0.25"
          color="#00d6ff"
          visible="false"
          animation="property: rotation; to: 0 0 360; loop: true; dur: 850">
  </a-ring>

  <a-plane id="scanBeam"
           position="0 0.82 -2.34"
           width="0.08"
           height="0.52"
           color="#67e8f9"
           opacity="0"
           visible="false"
           animation="property: opacity; from: 0; to: 0.28; dir: alternate; dur: 230; loop: true">
  </a-plane>

  <!-- Meal image -->
  <a-image id="mealImage"
           position="0 0.82 -2.32"
           width="0.82"
           height="0.58"
           visible="false">
  </a-image>

  <!-- Status -->
  <a-text id="scanState"
          value="Ready for scan"
          position="0 0.30 -2.34"
          align="center"
          color="#eef8ff"
          width="2.2">
  </a-text>

  <!-- Info around image -->
  <a-text id="caloriesText"
          value=""
          position="0 1.15 -2.28"
          align="center"
          color="#ffffff"
          width="1.2"
          visible="false">
  </a-text>

  <a-text id="proteinText"
          value=""
          position="-0.95 0.82 -2.28"
          align="center"
          color="#8fdcff"
          width="1.2"
          visible="false">
  </a-text>

  <a-text id="rewardText"
          value=""
          position="0.95 0.82 -2.28"
          align="center"
          color="#f5c96b"
          width="1.2"
          visible="false">
  </a-text>

  <a-text id="riskText"
          value=""
          position="0 0.05 -2.28"
          align="center"
          color="#d5dfff"
          width="1.2"
          visible="false">
  </a-text>

  <!-- Meal name -->
  <a-text id="mealTitle"
          value=""
          position="0 -0.35 -2.30"
          align="center"
          color="#ffffff"
          width="2.4"
          visible="false">
  </a-text>

  <!-- Buttons -->
  <a-plane id="detailsBtn"
           class="clickable"
           position="-0.58 -0.80 -2.32"
           width="1.0"
           height="0.22"
           color="#7c3aed"
           visible="false">
  </a-plane>
  <a-text id="detailsBtnLabel"
          value="AI Details"
          position="-0.58 -0.80 -2.28"
          align="center"
          color="#ffffff"
          width="1.5"
          visible="false">
  </a-text>

  <a-plane id="againBtn"
           class="clickable"
           position="0.58 -0.80 -2.32"
           width="1.0"
           height="0.22"
           color="#0ea5e9"
           visible="false">
  </a-plane>
  <a-text id="againBtnLabel"
          value="Scan Again"
          position="0.58 -0.80 -2.28"
          align="center"
          color="#ffffff"
          width="1.5"
          visible="false">
  </a-text>

  <!-- Details card -->
  <a-plane id="detailsCard"
           position="0 -1.25 -2.36"
           width="2.55"
           height="0.44"
           color="#050b14"
           visible="false">
  </a-plane>

  <a-text id="detailsText"
          value=""
          position="0 -1.25 -2.31"
          align="center"
          color="#a9dcff"
          width="2.0"
          visible="false">
  </a-text>

</a-scene>

<script>
  const API_KEY = "AIzaSyD6CJ45RiftcqFDNjIjskTKk2PiHWZ_TPQ";
  let preparedAnalysis = null;

  const overlayUI = document.getElementById("overlayUI");
  const prepareState = document.getElementById("prepareState");

  const startScanBtn = document.getElementById("startScanBtn");
  const startScanLabel = document.getElementById("startScanLabel");
  const scanRing = document.getElementById("scanRing");
  const scanBeam = document.getElementById("scanBeam");
  const mealImage = document.getElementById("mealImage");

  const scanState = document.getElementById("scanState");
  const caloriesText = document.getElementById("caloriesText");
  const proteinText = document.getElementById("proteinText");
  const rewardText = document.getElementById("rewardText");
  const riskText = document.getElementById("riskText");
  const mealTitle = document.getElementById("mealTitle");

  const detailsBtn = document.getElementById("detailsBtn");
  const detailsBtnLabel = document.getElementById("detailsBtnLabel");
  const againBtn = document.getElementById("againBtn");
  const againBtnLabel = document.getElementById("againBtnLabel");
  const detailsCard = document.getElementById("detailsCard");
  const detailsText = document.getElementById("detailsText");

  async function prepareAnalysis() {
    const file = document.getElementById("imageInput").files[0];
    if (!file) {
      alert("Please choose an image first.");
      return;
    }

    prepareState.textContent = "Preparing AI analysis...";
    scanState.setAttribute("value", "Preparing AI analysis...");
    hideResultSections();

    try {
      const base64 = await toBase64(file);
      const imageUrl = URL.createObjectURL(file);

      const res = await fetch(`https://vision.googleapis.com/v1/images:annotate?key=${API_KEY}`, {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
          requests: [{
            image: { content: base64 },
            features: [
              { type: "LABEL_DETECTION", maxResults: 5 },
              { type: "OBJECT_LOCALIZATION", maxResults: 3 }
            ]
          }]
        })
      });

      const data = await res.json();

      if (!res.ok) {
        prepareState.textContent = "AI preparation failed.";
        scanState.setAttribute("value", "AI preparation failed");
        alert(data.error?.message || "Vision API error");
        return;
      }

      const labels = data?.responses?.[0]?.labelAnnotations || [];
      if (!labels.length) {
        prepareState.textContent = "No meal detected.";
        scanState.setAttribute("value", "No meal detected");
        alert("No labels found. Try another image.");
        return;
      }

      const mealData = inferMealData(labels.map(l => l.description));
      const labelsText = labels
        .slice(0, 4)
        .map((l, i) => `${i + 1}. ${l.description} (${Math.round((l.score || 0) * 100)}%)`)
        .join("\n");

      preparedAnalysis = {
        name: mealData.name,
        calories: mealData.calories,
        protein: mealData.protein,
        reward: mealData.reward,
        wasteRisk: mealData.wasteRisk,
        labels: labelsText,
        imageUrl
      };

      prepareState.textContent = "AI ready. Enter XR and press Start Scan.";
      scanState.setAttribute("value", "AI ready. Enter XR and press Start Scan.");
    } catch (err) {
      prepareState.textContent = "Request failed.";
      scanState.setAttribute("value", "Request failed");
      alert(err.message);
    }
  }

  function enterXRMode() {
    overlayUI.style.display = "none";
    const scene = document.querySelector("a-scene");
    if (scene.enterVR) scene.enterVR();
  }

  startScanBtn.addEventListener("click", () => {
    if (!preparedAnalysis) {
      scanState.setAttribute("value", "Please analyze first");
      return;
    }

    hideResultSections();

    startScanBtn.setAttribute("visible", false);
    startScanLabel.setAttribute("visible", false);

    scanRing.setAttribute("visible", true);
    scanBeam.setAttribute("visible", true);
    scanState.setAttribute("value", "Detecting meal...");

    setTimeout(() => {
      scanState.setAttribute("value", "Analyzing nutrition...");
    }, 650);

    setTimeout(() => {
      scanState.setAttribute("value", "Calculating reward...");
    }, 1350);

    setTimeout(() => {
      scanRing.setAttribute("visible", false);
      scanBeam.setAttribute("visible", false);
      showPreparedResult();
    }, 2200);
  });

  detailsBtn.addEventListener("click", () => {
    const visible = detailsCard.getAttribute("visible");
    detailsCard.setAttribute("visible", !visible);
    detailsText.setAttribute("visible", !visible);
  });

  againBtn.addEventListener("click", () => {
    hideResultSections();
    mealImage.setAttribute("visible", false);
    startScanBtn.setAttribute("visible", true);
    startScanLabel.setAttribute("visible", true);
    scanState.setAttribute("value", "Ready for scan");
  });

  function showPreparedResult() {
    mealImage.setAttribute("src", preparedAnalysis.imageUrl);
    mealImage.setAttribute("visible", true);

    mealTitle.setAttribute("value", preparedAnalysis.name);
    mealTitle.setAttribute("visible", true);

    caloriesText.setAttribute("value", preparedAnalysis.calories);
    caloriesText.setAttribute("visible", true);

    proteinText.setAttribute("value", `Protein\n${preparedAnalysis.protein}`);
    proteinText.setAttribute("visible", true);

    rewardText.setAttribute("value", preparedAnalysis.reward);
    rewardText.setAttribute("visible", true);

    riskText.setAttribute("value", preparedAnalysis.wasteRisk);
    riskText.setAttribute("visible", true);

    detailsText.setAttribute("value", preparedAnalysis.labels);

    detailsBtn.setAttribute("visible", true);
    detailsBtnLabel.setAttribute("visible", true);
    againBtn.setAttribute("visible", true);
    againBtnLabel.setAttribute("visible", true);

    scanState.setAttribute("value", "Analysis complete");
  }

  function hideResultSections() {
    mealImage.setAttribute("visible", false);
    mealTitle.setAttribute("visible", false);

    caloriesText.setAttribute("visible", false);
    proteinText.setAttribute("visible", false);
    rewardText.setAttribute("visible", false);
    riskText.setAttribute("visible", false);

    detailsBtn.setAttribute("visible", false);
    detailsBtnLabel.setAttribute("visible", false);
    againBtn.setAttribute("visible", false);
    againBtnLabel.setAttribute("visible", false);

    detailsCard.setAttribute("visible", false);
    detailsText.setAttribute("visible", false);
  }

  function inferMealData(labels) {
    const text = labels.join(" ").toLowerCase();

    if (text.includes("rice") && (text.includes("chicken") || text.includes("meat"))) {
      return { name:"Chicken Rice", calories:"520 kcal", protein:"35g", reward:"+50 Miles", wasteRisk:"Low Risk" };
    }
    if (text.includes("salad") || (text.includes("vegetable") && text.includes("food"))) {
      return { name:"Salad Bowl", calories:"250 kcal", protein:"10g", reward:"+35 Miles", wasteRisk:"Medium Risk" };
    }
    if (text.includes("pasta") || text.includes("noodle")) {
      return { name:"Pasta Dish", calories:"480 kcal", protein:"18g", reward:"+40 Miles", wasteRisk:"Medium Risk" };
    }
    if (text.includes("sandwich") || text.includes("burger")) {
      return { name:"Sandwich / Burger", calories:"560 kcal", protein:"25g", reward:"+45 Miles", wasteRisk:"Medium Risk" };
    }
    if (text.includes("dessert") || text.includes("cake")) {
      return { name:"Dessert", calories:"320 kcal", protein:"5g", reward:"+20 Miles", wasteRisk:"High Risk" };
    }
    return { name:"Mixed Meal", calories:"400 kcal", protein:"20g", reward:"+30 Miles", wasteRisk:"Medium Risk" };
  }

  function toBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result.split(",")[1]);
      reader.onerror = err => reject(err);
      reader.readAsDataURL(file);
    });
  }
</script>

</body>
</html>
