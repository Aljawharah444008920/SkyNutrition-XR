<<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>SkyNutrition XR</title>

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

  <style>
    body { margin: 0; }
    #uploadUI {
      position: absolute;
      top: 20px;
      left: 20px;
      background: rgba(0,0,0,0.6);
      padding: 15px;
      border-radius: 12px;
      color: white;
      font-family: sans-serif;
      z-index: 10;
    }
  </style>
</head>

<body>

<!-- 👇 UI خارجي (اختياري) -->
<div id="uploadUI">
  <h3>SkyNutrition XR</h3>
  <button onclick="startScan()">Scan Meal</button>
</div>

<a-scene background="color: #071a2f">

  <!-- ✈️ طيارة تتحرك -->
  <a-entity id="plane"
    position="-6 2 -5"
    geometry="primitive: box"
    material="color: white"
    scale="0.5 0.2 1.5"
    animation="property: position; to: 6 2 -5; dur: 6000; loop: true">
  </a-entity>

  <!-- 🪑 منصة -->
  <a-box position="0 0 -3" width="6" height="0.2" depth="2"
         color="#1a2c47">
  </a-box>

  <!-- 🟩 شعارات -->
  <a-plane src="assets/saudi.png"
           position="-1.8 1.5 -3"
           width="1.8" height="0.8"
           material="shader: flat">
  </a-plane>

  <a-plane src="assets/kacst.png"
           position="1.8 1.5 -3"
           width="1.8" height="0.8"
           material="shader: flat">
  </a-plane>

  <!-- 🔘 زر Scan داخل VR -->
  <a-plane id="scanBtn"
           position="0 1 -2.5"
           width="1.8"
           height="0.6"
           color="#3b82f6"
           text="value: Scan Meal; align: center; color: white; width: 3"
           class="clickable">
  </a-plane>

  <!-- ⏳ حالة -->
  <a-text id="statusText"
          value="Ready to scan"
          position="0 0.3 -2.5"
          align="center"
          color="#9ecbff"
          width="3">
  </a-text>

  <!-- 🟦 بطاقة النتيجة -->
  <a-plane id="resultCard"
           position="0 0.8 -3"
           width="2.5"
           height="1.5"
           color="#0f2a44"
           visible="false">
  </a-plane>

  <!-- 📝 النص داخل النتيجة -->
  <a-text id="resultText"
          position="0 1 -2.9"
          align="center"
          color="white"
          width="3"
          visible="false">
  </a-text>

  <!-- 🔁 زر إعادة -->
  <a-plane id="againBtn"
           position="0 0.2 -2.5"
           width="1.5"
           height="0.5"
           color="#22c55e"
           text="value: Scan Again; align: center; color: white; width: 3"
           visible="false">
  </a-plane>

  <!-- 🎯 كاميرا -->
  <a-entity camera look-controls position="0 1.6 0">
    <a-cursor></a-cursor>
  </a-entity>

</a-scene>

<script>

const scanBtn = document.getElementById("scanBtn");
const statusText = document.getElementById("statusText");
const resultCard = document.getElementById("resultCard");
const resultText = document.getElementById("resultText");
const againBtn = document.getElementById("againBtn");

// 🔥 ضغط زر Scan
scanBtn.addEventListener("click", startScan);
againBtn.addEventListener("click", reset);

function startScan() {
  statusText.setAttribute("value", "Scanning...");
  scanBtn.setAttribute("visible", false);

  setTimeout(() => {
    showResult();
  }, 2000);
}

// 📊 عرض النتيجة
function showResult() {

  statusText.setAttribute("value", "Analysis Complete");

  resultCard.setAttribute("visible", true);
  resultText.setAttribute("visible", true);
  againBtn.setAttribute("visible", true);

  resultText.setAttribute("value",
`Chicken Meal 🍗

Calories: 520 kcal
Protein: 35g
Reward: +50 Miles ✈️
Waste Risk: Low`);
}

// 🔁 إعادة
function reset() {
  resultCard.setAttribute("visible", false);
  resultText.setAttribute("visible", false);
  againBtn.setAttribute("visible", false);
  scanBtn.setAttribute("visible", true);
  statusText.setAttribute("value", "Ready to scan");
}

</script>

</body>
</html>
