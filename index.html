<<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SkyNutrition XR — Premium Experience</title>

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://unpkg.com/aframe-troika-text/dist/aframe-troika-text.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    :root{
      --bg-1:#060b16;
      --bg-2:#0a1730;
      --bg-3:#12183b;
      --cyan:#74e3ff;
      --cyan-2:#38bdf8;
      --blue:#4f7cff;
      --violet:#7c3aed;
      --violet-2:#a855f7;
      --gold:#f5c96b;
      --white:#f8fbff;
      --muted:#c8ddff;
      --card:rgba(7,12,24,.82);
      --stroke:rgba(116,227,255,.18);
    }

    *{ box-sizing:border-box; font-family:"Inter",sans-serif; }

    body{
      margin:0;
      overflow:hidden;
      background:
        radial-gradient(circle at 15% 15%, rgba(124,58,237,.18), transparent 22%),
        radial-gradient(circle at 80% 20%, rgba(56,189,248,.14), transparent 24%),
        radial-gradient(circle at 50% 0%, #17305f 0%, #0a1630 38%, #050b15 100%);
    }

    .overlay{
      position:fixed;
      top:18px;
      left:18px;
      width:390px;
      padding:22px;
      border-radius:28px;
      background:
        linear-gradient(180deg, rgba(10,18,36,.88), rgba(7,12,26,.84));
      border:1px solid var(--stroke);
      box-shadow:
        0 24px 60px rgba(0,0,0,.42),
        inset 0 1px 0 rgba(255,255,255,.04),
        inset 0 0 50px rgba(56,189,248,.03);
      backdrop-filter: blur(16px);
      color:var(--white);
      z-index:20;
      overflow:hidden;
    }

    .overlay::before{
      content:"";
      position:absolute;
      inset:-1px;
      background:
        linear-gradient(135deg, rgba(116,227,255,.16), transparent 28%, transparent 72%, rgba(124,58,237,.12));
      pointer-events:none;
      border-radius:28px;
    }

    .eyebrow{
      display:inline-flex;
      align-items:center;
      gap:10px;
      padding:9px 14px;
      border-radius:999px;
      font-size:11px;
      font-weight:800;
      letter-spacing:1.3px;
      text-transform:uppercase;
      color:#dbf2ff;
      background:linear-gradient(90deg, rgba(56,189,248,.18), rgba(124,58,237,.18));
      border:1px solid rgba(116,227,255,.14);
      position:relative;
      z-index:1;
    }

    .title{
      position:relative;
      z-index:1;
      margin:16px 0 10px;
      font-size:62px;
      line-height:.92;
      letter-spacing:-2.8px;
      font-weight:800;
    }

    .title span{
      background:linear-gradient(180deg, #ffffff 0%, #d9ecff 60%, #9ad8ff 100%);
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
    }

    .sub{
      position:relative;
      z-index:1;
      margin:0;
      color:#dbeafe;
      font-size:17px;
      line-height:1.55;
      max-width:330px;
    }

    .panel{
      position:relative;
      z-index:1;
      margin-top:18px;
      padding:14px;
      border-radius:18px;
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.07);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.04);
    }

    input,button{
      width:100%;
      border:none;
      border-radius:15px;
      font-size:16px;
      box-sizing:border-box;
    }

    input{
      margin-top:4px;
      padding:14px;
      background:#ffffff;
      color:#111827;
    }

    button{
      margin-top:10px;
      padding:14px;
      font-weight:700;
      color:white;
      cursor:pointer;
      transition:transform .18s ease, box-shadow .18s ease, filter .18s ease;
    }

    button:hover{
      transform:translateY(-1px);
      filter:brightness(1.03);
    }

    .primary{
      background:linear-gradient(90deg, #5ee7ff, #4f7cff);
      box-shadow:0 14px 28px rgba(59,130,246,.28);
    }

    .secondary{
      background:linear-gradient(90deg, #272f44, #3c4761);
    }

    .hint{
      margin-top:12px;
      padding:11px 12px;
      border-radius:14px;
      color:#d9efff;
      background:rgba(116,227,255,.07);
      border:1px solid rgba(116,227,255,.10);
      font-size:13px;
      line-height:1.45;
      min-height:44px;
    }

    .foot{
      margin-top:12px;
      font-size:13px;
      line-height:1.45;
      color:#9ec9ff;
    }
  </style>
</head>
<body>

<div class="overlay" id="overlayUI">
  <div class="eyebrow">XR Premium Judge Demo</div>

  <div class="title">
    <span>SkyNutrition</span><br />
    <span>XR</span>
  </div>

  <p class="sub">
    A more cinematic inflight meal scan experience with live AI analysis and immersive XR presentation.
  </p>

  <div class="panel">
    <input type="file" id="imageInput" accept="image/*" />
    <button class="primary" onclick="prepareAnalysis()">Analyze & Prepare XR</button>
    <button class="secondary" onclick="enterXRMode()">Enter XR</button>
    <div class="hint" id="prepareState">Waiting for meal image.</div>
  </div>

  <div class="foot">
    Flow: upload image → analyze → enter XR → start scan.
  </div>
</div>

<script>
  const API_KEY = "AIzaSyD6CJ45RiftcqFDNjIjskTKk2PiHWZ_TPQ";

  let preparedAnalysis = null;

  const overlayUI = document.getElementById("overlayUI");
  const prepareState = document.getElementById("prepareState");

  const startScanBtn = document.getElementById("startScanBtn");
  const scanRing = document.getElementById("scanRing");
  const scanRing2 = document.getElementById("scanRing2");
  const scanBeam = document.getElementById("scanBeam");
  const scanGlow = document.getElementById("scanGlow");

  const scanStateText = document.getElementById("scanStateText");
  const resultCard = document.getElementById("resultCard");
  const resultAccent = document.getElementById("resultAccent");
  const mealText = document.getElementById("mealText");
  const metricsText = document.getElementById("metricsText");

  const detailsBtn = document.getElementById("detailsBtn");
  const detailsBtnText = document.getElementById("detailsBtnText");
  const againBtn = document.getElementById("againBtn");
  const againBtnText = document.getElementById("againBtnText");

  const detailsCard = document.getElementById("detailsCard");
  const detailsText = document.getElementById("detailsText");

  function setStateText(value) {
    scanStateText.setAttribute("troika-text", `value: ${value}; position: 0 0.14 -2.14; align: center; color: #eef8ff; fontSize: 0.060; font: https://cdn.jsdelivr.net/npm/@fontsource/inter/files/inter-latin-600-normal.woff; maxWidth: 1.85;`);
  }

  function setMealText(value) {
    mealText.setAttribute("troika-text", `value: ${value}; position: 0 -0.22 -2.12; align: center; color: #ffffff; fontSize: 0.10; font: https://cdn.jsdelivr.net/npm/@fontsource/orbitron/files/orbitron-latin-700-normal.woff; maxWidth: 1.92; visible: true;`);
  }

  function setMetricsText(value) {
    metricsText.setAttribute("troika-text", `value: ${value}; position: 0 -0.70 -2.12; align: center; color: #8fdcff; fontSize: 0.058; font: https://cdn.jsdelivr.net/npm/@fontsource/inter/files/inter-latin-600-normal.woff; maxWidth: 1.88; visible: true;`);
  }

  function setDetailsText(value) {
    detailsText.setAttribute("troika-text", `value: ${value}; position: 0 -1.73 -2.17; align: center; color: #a9dcff; fontSize: 0.050; font: https://cdn.jsdelivr.net/npm/@fontsource/inter/files/inter-latin-500-normal.woff; maxWidth: 1.92; visible: true;`);
  }

  async function prepareAnalysis() {
    const file = document.getElementById("imageInput").files[0];

    if (!file) {
      alert("Please choose an image first.");
      return;
    }

    prepareState.textContent = "Preparing AI analysis...";
    setStateText("Preparing AI analysis...");
    hideResultSections();

    try {
      const base64 = await toBase64(file);

      const res = await fetch(`https://vision.googleapis.com/v1/images:annotate?key=${API_KEY}`, {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
          requests: [{
            image: { content: base64 },
            features: [{ type: "LABEL_DETECTION", maxResults: 5 }]
          }]
        })
      });

      const data = await res.json();

      if (!res.ok) {
        prepareState.textContent = "AI preparation failed.";
        setStateText("AI preparation failed");
        alert(data.error?.message || "Vision API error");
        return;
      }

      const labels = data?.responses?.[0]?.labelAnnotations || [];

      if (!labels.length) {
        prepareState.textContent = "No meal detected.";
        setStateText("No meal detected");
        alert("No labels found. Try another image.");
        return;
      }

      const mealData = inferMealData(labels.map(l => l.description));
      const labelsText = labels
        .slice(0, 4)
        .map((l, i) => `${i + 1}. ${l.description} (${Math.round((l.score || 0) * 100)}%)`)
        .join("\n");

      preparedAnalysis = {
        name: mealData.name,
        calories: mealData.calories,
        protein: mealData.protein,
        reward: mealData.reward,
        wasteRisk: mealData.wasteRisk,
        labels: labelsText
      };

      prepareState.textContent = "AI ready. Enter XR and start scan.";
      setStateText("AI ready. Enter XR and start scan.");
    } catch (err) {
      prepareState.textContent = "Request failed.";
      setStateText("Request failed");
      alert(err.message);
    }
  }

  function enterXRMode() {
    overlayUI.style.display = "none";
    const scene = document.querySelector("a-scene");
    if (scene.enterVR) scene.enterVR();
  }

  startScanBtn.addEventListener("click", () => {
    if (!preparedAnalysis) {
      setStateText("Please analyze first");
      return;
    }

    hideResultSections();
    startScanBtn.setAttribute("visible", false);

    scanRing.setAttribute("visible", true);
    scanRing2.setAttribute("visible", true);
    scanBeam.setAttribute("visible", true);
    scanGlow.setAttribute("visible", true);

    setStateText("Detecting meal...");

    setTimeout(() => setStateText("Analyzing nutrition..."), 650);
    setTimeout(() => setStateText("Calculating reward..."), 1350);

    setTimeout(() => {
      scanRing.setAttribute("visible", false);
      scanRing2.setAttribute("visible", false);
      scanBeam.setAttribute("visible", false);
      scanGlow.setAttribute("visible", false);
      showPreparedResult();
    }, 2200);
  });

  detailsBtn.addEventListener("click", () => {
    const visible = detailsCard.getAttribute("visible");
    detailsCard.setAttribute("visible", !visible);
    detailsText.setAttribute("visible", !visible);
  });

  againBtn.addEventListener("click", () => {
    hideResultSections();
    startScanBtn.setAttribute("visible", true);
    setStateText("Ready for scan");
  });

  function showPreparedResult() {
    resultCard.setAttribute("visible", true);
    resultAccent.setAttribute("visible", true);
    mealText.setAttribute("visible", true);
    metricsText.setAttribute("visible", true);

    detailsBtn.setAttribute("visible", true);
    detailsBtnText.setAttribute("visible", true);
    againBtn.setAttribute("visible", true);
    againBtnText.setAttribute("visible", true);

    setMealText(preparedAnalysis.name);
    setMetricsText(
      `Calories: ${preparedAnalysis.calories}\nProtein: ${preparedAnalysis.protein}\nReward: ${preparedAnalysis.reward}\nRisk: ${preparedAnalysis.wasteRisk}`
    );
    setDetailsText(preparedAnalysis.labels);

    setStateText("Analysis complete");
  }

  function hideResultSections() {
    resultCard.setAttribute("visible", false);
    resultAccent.setAttribute("visible", false);
    mealText.setAttribute("visible", false);
    metricsText.setAttribute("visible", false);

    detailsBtn.setAttribute("visible", false);
    detailsBtnText.setAttribute("visible", false);
    againBtn.setAttribute("visible", false);
    againBtnText.setAttribute("visible", false);

    detailsCard.setAttribute("visible", false);
    detailsText.setAttribute("visible", false);
  }

  function inferMealData(labels) {
    const text = labels.join(" ").toLowerCase();

    if (text.includes("rice") && (text.includes("chicken") || text.includes("meat"))) {
      return { name:"Chicken Rice", calories:"520 kcal", protein:"35g", reward:"+50 Miles", wasteRisk:"Low" };
    }
    if (text.includes("salad") || (text.includes("vegetable") && text.includes("food"))) {
      return { name:"Salad Bowl", calories:"250 kcal", protein:"10g", reward:"+35 Miles", wasteRisk:"Medium" };
    }
    if (text.includes("pasta") || text.includes("noodle")) {
      return { name:"Pasta Dish", calories:"480 kcal", protein:"18g", reward:"+40 Miles", wasteRisk:"Medium" };
    }
    if (text.includes("sandwich") || text.includes("burger")) {
      return { name:"Sandwich / Burger", calories:"560 kcal", protein:"25g", reward:"+45 Miles", wasteRisk:"Medium" };
    }
    if (text.includes("dessert") || text.includes("cake")) {
      return { name:"Dessert", calories:"320 kcal", protein:"5g", reward:"+20 Miles", wasteRisk:"High" };

  function toBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result.split(",")[1]);
      reader.onerror = err => reject(err);
      reader.readAsDataURL(file);
    });
  }
