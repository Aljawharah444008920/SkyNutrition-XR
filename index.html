<<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SkyNutrition XR — WOW Demo</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #12305a 0%, #071a2f 60%, #040b18 100%);
    }

    .overlay {
      position: fixed;
      top: 20px;
      left: 20px;
      width: 370px;
      padding: 22px;
      border-radius: 22px;
      background: linear-gradient(180deg, rgba(8,20,45,0.96), rgba(6,12,28,0.95));
      color: white;
      z-index: 20;
      box-shadow: 0 16px 40px rgba(0,0,0,0.35);
      border: 1px solid rgba(124,173,255,0.16);
      backdrop-filter: blur(10px);
    }

    .badge {
      display: inline-block;
      margin-bottom: 14px;
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 12px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #bcd8ff;
      background: rgba(59,130,246,0.16);
    }

    .overlay h2 {
      margin: 0 0 12px 0;
      font-size: 42px;
      line-height: 1;
    }

    .overlay p {
      margin: 0 0 16px 0;
      font-size: 15px;
      line-height: 1.5;
      color: #dbeafe;
    }

    .input-wrap {
      margin-top: 18px;
      padding: 14px;
      border-radius: 16px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
    }

    input, button {
      width: 100%;
      margin-top: 10px;
      padding: 12px;
      border-radius: 12px;
      border: none;
      box-sizing: border-box;
      font-size: 16px;
    }

    input {
      background: white;
      color: #111827;
    }

    button {
      background: linear-gradient(90deg,#7cc7ff,#3b82f6);
      color: white;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 10px 22px rgba(59,130,246,0.25);
    }

    .secondary-btn {
      background: linear-gradient(90deg,#334155,#475569);
    }

    .note {
      margin-top: 14px;
      font-size: 13px;
      color: #9fc5ff;
    }
  </style>
</head>
<body>

<div class="overlay">
  <div class="badge">Final Judge Demo</div>
  <h2>SkyNutrition XR</h2>
  <p>Upload a meal image, analyze it with AI, then enter the immersive XR scan experience.</p>

  <div class="input-wrap">
    <input type="file" id="imageInput" accept="image/*">
    <button onclick="prepareAnalysis()">Analyze & Prepare XR</button>
    <button class="secondary-btn" onclick="enterVRMode()">Enter VR</button>
  </div>

  <div class="note">Best flow: upload → analyze → enter VR → focus on Start Scan.</div>
</div>

<a-scene renderer="colorManagement: true" background="color: #06101f">

  <!-- Camera -->
  <a-entity position="0 1.6 0">
    <a-camera>
      <a-cursor
        color="#9dd6ff"
        fuse="true"
        fuse-timeout="900"
        raycaster="objects: .clickable">
      </a-cursor>
    </a-camera>
  </a-entity>

  <a-sky color="#06101f"></a-sky>

  <!-- Atmosphere -->
  <a-plane position="0 3 -7" width="20" height="9" color="#11284f" opacity="0.24"></a-plane>
  <a-plane position="-5 2 -6" width="3.5" height="6" color="#12305e" opacity="0.09"></a-plane>
  <a-plane position="5 2 -6" width="3.5" height="6" color="#12305e" opacity="0.09"></a-plane>

  <!-- Runway / platform -->
  <a-plane position="0 0 -4.2" rotation="-90 0 0" width="12" height="4.5" color="#091321"></a-plane>
  <a-plane position="0 0.01 -4.2" rotation="-90 0 0" width="0.08" height="3.7" color="#60a5fa" opacity="0.7"></a-plane>

  <!-- Floating particles vibe -->
  <a-sphere position="-2.8 2.6 -5.5" radius="0.03" color="#7dd3fc" opacity="0.5"
            animation="property: position; to: -2.8 2.8 -5.5; dir: alternate; dur: 2000; loop: true"></a-sphere>
  <a-sphere position="2.4 2.2 -5.8" radius="0.025" color="#93c5fd" opacity="0.4"
            animation="property: position; to: 2.4 2.45 -5.8; dir: alternate; dur: 1700; loop: true"></a-sphere>
  <a-sphere position="1.7 3.0 -6.2" radius="0.02" color="#bfdbfe" opacity="0.35"
            animation="property: position; to: 1.7 3.2 -6.2; dir: alternate; dur: 2200; loop: true"></a-sphere>

  <!-- Animated airplane -->
  <a-entity position="-5.2 2.55 -5.2"
            animation="property: position; to: 5.2 2.85 -5.2; dur: 6200; easing: linear; loop: true">
    <a-cylinder position="0 0 0" radius="0.11" height="1.25" rotation="90 0 0" color="#ffffff"></a-cylinder>
    <a-box position="0 0 0" width="1.28" height="0.04" depth="0.22" color="#8dc6ff"></a-box>
    <a-box position="0 0 -0.43" width="0.35" height="0.03" depth="0.08" color="#8dc6ff"></a-box>
    <a-box position="0 0.18 -0.43" width="0.08" height="0.22" depth="0.04" color="#8dc6ff"></a-box>
    <a-sphere position="0 0 0.62" radius="0.11" color="#ffffff"></a-sphere>
  </a-entity>

  <!-- Logo header -->
  <a-plane position="0 2.95 -2.65" width="4.2" height="0.95" color="#10284d" opacity="0.97"></a-plane>
  <a-plane position="0 3.31 -2.63" width="3.6" height="0.05" color="#79beff" opacity="0.95"
           animation="property: opacity; from: 0.45; to: 1; dir: alternate; dur: 1300; loop: true"></a-plane>

  <a-plane position="-1.15 2.88 -2.62" width="1.7" height="0.52" color="#ffffff"></a-plane>
  <a-image src="assets/saudi.png" position="-1.15 2.88 -2.61" width="1.52" height="0.30"></a-image>

  <a-plane position="0 2.88 -2.60" width="0.02" height="0.68" color="#8cccff" opacity="0.7"></a-plane>

  <a-plane position="1.15 2.88 -2.62" width="1.7" height="0.52" color="#ffffff"></a-plane>
  <a-image src="assets/kacst.png" position="1.15 2.88 -2.61" width="1.52" height="0.40"></a-image>

  <!-- Main hero panel -->
  <a-plane
    id="mainPanel"
    position="0 1.22 -2.35"
    width="3.05"
    height="1.95"
    color="#0c1f3f"
    opacity="0.98"
    animation="property: scale; from: 0.88 0.88 0.88; to: 1 1 1; dur: 800; easing: easeOutCubic">
  </a-plane>

  <a-plane position="0 1.98 -2.33" width="2.65" height="0.07" color="#79beff" opacity="0.95"></a-plane>

  <a-text
    value="SkyNutrition XR"
    position="0 1.72 -2.28"
    align="center"
    color="#ffffff"
    width="3.2"
    font="mozillavr">
  </a-text>

  <a-text
    value="Inflight meal scan experience"
    position="0 1.50 -2.28"
    align="center"
    color="#8cccff"
    width="2.1"
    wrap-count="26"
    font="mozillavr">
  </a-text>

  <!-- Start Scan Button -->
  <a-plane id="startScanBtn"
           position="0 1.08 -2.26"
           width="1.45"
           height="0.34"
           color="#2f6ef0"
           class="clickable"
           text="value: Start Scan; align: center; color: white; width: 2.8"
           animation__hover="property: scale; startEvents: mouseenter; to: 1.08 1.08 1.08; dur: 160"
           animation__leave="property: scale; startEvents: mouseleave; to: 1 1 1; dur: 160">
  </a-plane>

  <!-- Scan HUD -->
  <a-ring id="scanRing"
          position="0 0.62 -2.24"
          radius-inner="0.17"
          radius-outer="0.26"
          color="#00cfff"
          visible="false"
          animation="property: rotation; to: 0 0 360; loop: true; dur: 900">
  </a-ring>

  <a-ring id="scanRing2"
          position="0 0.62 -2.245"
          radius-inner="0.28"
          radius-outer="0.31"
          color="#7dd3fc"
          visible="false"
          opacity="0.5"
          animation="property: scale; from: 0.8 0.8 0.8; to: 1.1 1.1 1.1; dir: alternate; dur: 650; loop: true">
  </a-ring>

  <a-plane id="scanBeam"
           position="0 0.62 -2.23"
           width="0.10"
           height="0.55"
           color="#67e8f9"
           opacity="0.0"
           visible="false"
           animation="property: opacity; from: 0.0; to: 0.25; dir: alternate; dur: 300; loop: true">
  </a-plane>

  <!-- State Text -->
  <a-text id="scanState"
          value="Ready for scan"
          position="0 0.10 -2.22"
          align="center"
          color="#e5f1ff"
          width="2.05"
          wrap-count="24"
          font="mozillavr">
  </a-text>

  <!-- Result Card -->
  <a-plane id="resultCard"
           position="0 -0.55 -2.24"
           width="2.6"
           height="1.0"
           color="#08111f"
           opacity="0.97"
           visible="false">
  </a-plane>

  <a-text id="meal"
          value=""
          position="0 -0.22 -2.19"
          align="center"
          color="#ffffff"
          width="2.15"
          wrap-count="22"
          visible="false"
          font="mozillavr">
  </a-text>

  <a-text id="metrics"
          value=""
          position="0 -0.70 -2.19"
          align="center"
          color="#7dd3fc"
          width="1.95"
          wrap-count="24"
          visible="false"
          font="mozillavr">
  </a-text>

  <!-- Action Buttons -->
  <a-plane id="detailsBtn"
           position="-0.60 -1.23 -2.22"
           width="0.98"
           height="0.23"
           color="#1d4ed8"
           visible="false"
           class="clickable"
           text="value: AI Details; align: center; color: white; width: 1.9">
  </a-plane>

  <a-plane id="againBtn"
           position="0.60 -1.23 -2.22"
           width="0.98"
           height="0.23"
           color="#16a34a"
           visible="false"
           class="clickable"
           text="value: Scan Again; align: center; color: white; width: 1.9">
  </a-plane>

  <!-- Details Card -->
  <a-plane id="detailsCard"
           position="0 -1.78 -2.27"
           width="2.6"
           height="0.52"
           color="#06101d"
           visible="false">
  </a-plane>

  <a-text id="result"
          value=""
          position="0 -1.80 -2.23"
          align="center"
          color="#9dd6ff"
          width="1.95"
          wrap-count="24"
          visible="false"
          font="mozillavr">
  </a-text>

</a-scene>

<script>
  const API_KEY = "AIzaSyD6CJ45RiftcqFDNjIjskTKk2PiHWZ_TPQ";

  let preparedAnalysis = null;

  const startScanBtn = document.getElementById("startScanBtn");
  const scanRing = document.getElementById("scanRing");
  const scanRing2 = document.getElementById("scanRing2");
  const scanBeam = document.getElementById("scanBeam");
  const scanState = document.getElementById("scanState");
  const resultCard = document.getElementById("resultCard");
  const mealEl = document.getElementById("meal");
  const metricsEl = document.getElementById("metrics");
  const resultEl = document.getElementById("result");
  const detailsCard = document.getElementById("detailsCard");
  const detailsBtn = document.getElementById("detailsBtn");
  const againBtn = document.getElementById("againBtn");

  async function prepareAnalysis() {
    const file = document.getElementById("imageInput").files[0];

    if (!file) {
      alert("Please choose an image first.");
      return;
    }

    scanState.setAttribute("value", "Preparing AI analysis...");
    hideResultSections();

    try {
      const base64 = await toBase64(file);

      const res = await fetch(`https://vision.googleapis.com/v1/images:annotate?key=${API_KEY}`, {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
          requests: [{
            image: { content: base64 },
            features: [{ type: "LABEL_DETECTION", maxResults: 5 }]
          }]
        })
      });

      const data = await res.json();

      if (!res.ok) {
        scanState.setAttribute("value", "AI preparation failed");
        alert(data.error?.message || "Vision API error");
        return;
      }

      const labels = data?.responses?.[0]?.labelAnnotations || [];

      if (!labels.length) {
        scanState.setAttribute("value", "No meal detected");
        alert("No labels found. Try another image.");
        return;
      }

      const mealData = inferMealData(labels.map(l => l.description));
      const labelsText = labels
        .slice(0, 4)
        .map((l, i) => `${i + 1}. ${l.description} (${Math.round((l.score || 0) * 100)}%)`)
        .join("\n");

      preparedAnalysis = {
        name: mealData.name,
        calories: mealData.calories,
        protein: mealData.protein,
        reward: mealData.reward,
        wasteRisk: mealData.wasteRisk,
        labels: labelsText
      };

      scanState.setAttribute("value", "AI ready. Enter VR and press Start Scan.");
      alert("AI analysis prepared successfully.");

    } catch (err) {
      scanState.setAttribute("value", "Request failed");
      alert(err.message);
    }
  }

  function enterVRMode() {
    const scene = document.querySelector("a-scene");
    if (scene.enterVR) {
      scene.enterVR();
    }
  }

  startScanBtn.addEventListener("click", () => {
    if (!preparedAnalysis) {
      scanState.setAttribute("value", "Please analyze first.");
      return;
    }

    hideResultSections();
    startScanBtn.setAttribute("visible", false);
    scanRing.setAttribute("visible", true);
    scanRing2.setAttribute("visible", true);
    scanBeam.setAttribute("visible", true);

    scanState.setAttribute("value", "Detecting meal...");

    setTimeout(() => {
      scanState.setAttribute("value", "Analyzing nutrition...");
    }, 700);

    setTimeout(() => {
      scanState.setAttribute("value", "Calculating reward...");
    }, 1400);

    setTimeout(() => {
      scanRing.setAttribute("visible", false);
      scanRing2.setAttribute("visible", false);
      scanBeam.setAttribute("visible", false);
      showPreparedResult();
    }, 2200);
  });

  detailsBtn.addEventListener("click", () => {
    const visible = detailsCard.getAttribute("visible");
    detailsCard.setAttribute("visible", !visible);
    resultEl.setAttribute("visible", !visible);
  });

  againBtn.addEventListener("click", () => {
    hideResultSections();
    startScanBtn.setAttribute("visible", true);
    scanState.setAttribute("value", "Ready for scan");
  });

  function showPreparedResult() {
    resultCard.setAttribute("visible", true);
    mealEl.setAttribute("visible", true);
    metricsEl.setAttribute("visible", true);
    detailsBtn.setAttribute("visible", true);
    againBtn.setAttribute("visible", true);

    mealEl.setAttribute("value", preparedAnalysis.name);
    metricsEl.setAttribute(
      "value",
      `Calories: ${preparedAnalysis.calories}\nProtein: ${preparedAnalysis.protein}\nReward: ${preparedAnalysis.reward}\nRisk: ${preparedAnalysis.wasteRisk}`
    );

    resultEl.setAttribute("value", preparedAnalysis.labels);
    scanState.setAttribute("value", "Analysis complete");
  }

  function hideResultSections() {
    resultCard.setAttribute("visible", false);
    mealEl.setAttribute("visible", false);
    metricsEl.setAttribute("visible", false);
    detailsBtn.setAttribute("visible", false);
    againBtn.setAttribute("visible", false);
    detailsCard.setAttribute("visible", false);
    resultEl.setAttribute("visible", false);
  }

  function inferMealData(labels) {
    const text = labels.join(" ").toLowerCase();

    if (text.includes("rice") && (text.includes("chicken") || text.includes("meat"))) {
      return { name:"Chicken Rice", calories:"520 kcal", protein:"35g", reward:"+50 Miles", wasteRisk:"Low" };
    }
    if (text.includes("salad") || (text.includes("vegetable") && text.includes("food"))) {
      return { name:"Salad Bowl", calories:"250 kcal", protein:"10g", reward:"+35 Miles", wasteRisk:"Medium" };
    }
    if (text.includes("pasta") || text.includes("noodle")) {
      return { name:"Pasta Dish", calories:"480 kcal", protein:"18g", reward:"+40 Miles", wasteRisk:"Medium" };
    }
    if (text.includes("sandwich") || text.includes("burger")) {
      return { name:"Sandwich / Burger", calories:"560 kcal", protein:"25g", reward:"+45 Miles", wasteRisk:"Medium" };
    }
    if (text.includes("dessert") || text.includes("cake")) {
      return { name:"Dessert", calories:"320 kcal", protein:"5g", reward:"+20 Miles", wasteRisk:"High" };
    }

    return { name:"Mixed Meal", calories:"400 kcal", protein:"20g", reward:"+30 Miles", wasteRisk:"Medium" };
  }

  function toBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result.split(",")[1]);
      reader.onerror = err => reject(err);
      reader.readAsDataURL(file);
    });
  }
</script>

</body>
</html>
