<<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SkyNutrition XR</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      overflow: hidden;
      background: radial-gradient(circle at top, #10244a 0%, #061227 65%, #040b18 100%);

    .overlay {
      position: fixed;
      top: 20px;

      padding: 22px;
      border-radius: 22px;
      background: linear-gradient(180deg, rgba(10,25,55,0.96), rgba(7,15,30,0.95));
      color: white;
      z-index: 10;
      box-shadow: 0 16px 40px rgba(0,0,0,0.35);
      border: 1px solid rgba(124,173,255,0.16);
    }

    .overlay h2 {
      margin: 0 0 12px 0;
      font-size: 44px;
      line-height: 1;
    }

    .overlay p {
      margin: 0 0 16px 0;
      font-size: 16px;
      line-height: 1.5;
      color: #dbeafe;
    }

    .badge {
      display: inline-block;
      margin-bottom: 14px;
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 12px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #bcd8ff;
      background: rgba(59,130,246,0.16);
    }

    .input-wrap {
      margin-top: 18px;
      padding: 14px;
      border-radius: 16px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
    }

    input, button {
      width: 100%;
      margin-top: 10px;
      padding: 12px;
      border-radius: 12px;
      border: none;
      box-sizing: border-box;
      font-size: 16px;
    }

    input {
      background: white;
      color: #111827;
    }

    button {
      background: linear-gradient(90deg,#7cc7ff,#3b82f6);
      color: white;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 10px 22px rgba(59,130,246,0.25);
    }

    .note {
      margin-top: 14px;
      font-size: 13px;
      color: #9fc5ff;
    }
  </style>
</head>

<body>

<div class="overlay">
  <div class="badge">Premium Cabin Demo</div>
  <h2>SkyNutrition XR</h2>
  <p>Inflight meal intelligence powered by real AI image analysis.</p>

  <div class="input-wrap">
    <input type="file" id="imageInput" accept="image/*">
    <button onclick="analyzeImage()">Scan Meal</button>
  </div>

  <div class="note">Upload a meal image to preview the inflight passenger experience.</div>
</div>

  <!-- Background glow panels -->

  <a-plane position="-4.5 1.7 -6" width="3" height="5.5" color="#12305e" opacity="0.12"></a-plane>
  <a-plane position="4.5 1.7 -6" width="3" height="5.5" color="#12305e" opacity="0.12"></a-plane>

  <!-- Clearer airplane -->
  <a-entity position="-4.8 2.55 -5.2"
            animation="property: position; to: 4.8 2.85 -5.2; dur: 6500; easing: linear; loop: true">

    <a-cylinder position="0 0 0" radius="0.11" height="1.3" rotation="90 0 0" color="#ffffff"></a-cylinder>
    <a-box position="0 0 0" width="1.35" height="0.04" depth="0.22" color="#8dc6ff"></a-box>
    <a-box position="0 0 -0.45" width="0.35" height="0.03" depth="0.08" color="#8dc6ff"></a-box>
    <a-box position="0 0.18 -0.45" width="0.08" height="0.24" depth="0.04" color="#8dc6ff"></a-box>
    <a-sphere position="0 0 0.65" radius="0.11" color="#ffffff"></a-sphere>
  </a-entity>

  <!-- Logo Header -->
  <a-plane
    position="0 3.12 -2.95"
    width="4.6"
    height="1.18"
    color="#0f2448"
    material="shader: flat; opacity: 0.98">
  </a-plane>

  <a-plane
    position="0 3.6 -2.93"
    width="4.05"
    height="0.06"
    color="#79beff"
    opacity="0.95"
    animation="property: opacity; from: 0.45; to: 1; dir: alternate; dur: 1300; loop: true">
  </a-plane>

  <!-- Saudi card -->
  <a-plane
    position="-1.28 3.08 -2.92"
    width="1.9"
    height="0.62"
    color="#ffffff"
    material="shader: flat; opacity: 1">
  </a-plane>

  <!-- KACST card -->
  <a-plane
    position="1.28 3.08 -2.92"
    width="1.9"
    height="0.62"
    color="#ffffff"
    material="shader: flat; opacity: 1">
  </a-plane>

  <!-- Saudi logo -->
  <a-image
    src="assets/saudi.png"
    position="-1.28 3.08 -2.91"
    width="1.72"
    height="0.34"
    opacity="1">
  </a-image>

  <!-- Divider -->
  <a-plane
    position="0 3.08 -2.905"
    width="0.02"
    height="0.78"
    color="#8cccff"
    opacity="0.7">
  </a-plane>

  <!-- KACST logo -->
  <a-image
    src="assets/kacst.png"
    position="1.28 3.08 -2.91"
    width="1.72"
    height="0.46"
    opacity="1">
  </a-image>

  <!-- Main Panel -->
  <a-plane
    position="0 1.22 -2.85"
    width="4.35"
    height="3.05"
    color="#0d1f3f"
    material="shader: flat; opacity: 0.99"
    animation="property: position; from: 0 0.45 -2.85; to: 0 1.22 -2.85; dur: 1100; easing: easeOutCubic">
  </a-plane>

  <!-- Accent line -->
  <a-plane
    position="0 2.42 -2.83"
    width="3.85"
    height="0.08"
    color="#79beff"
    opacity="0.95">
  </a-plane>

  <!-- Title -->
  <a-text
    value="SKYNUTRITION XR"
    position="0 2.05 -2.8"
    align="center"
    color="#ffffff"
    width="5"
    font="mozillavr">
  </a-text>

  <a-text
    value="Inflight Meal Intelligence"
    position="0 1.78 -2.8"
    align="center"
    color="#8cccff"
    width="3.4"
    font="mozillavr">
  </a-text>

  <!-- Status -->
  <a-plane
    position="0 1.4 -2.79"
    width="3.45"

    color="#17315f">
  </a-plane>

  <a-text
    id="status"
    value="STATUS: Waiting for scan"

  <!-- Meal -->
  <a-plane

  <a-text

    position="0 1.04 -2.75"

    width="2">
  </a-text>

  <a-text
    id="meal"
    value="Awaiting image..."
    position="0 0.78 -2.74"
    align="center"
    color="#ffffff"
    width="3"
    wrap-count="30">
  </a-text>

  <!-- Metrics -->
  <a-plane
    position="0 0.22 -2.78"
    width="3.45"
    height="0.78"
    color="#08111f">
  </a-plane>

  <a-text
    value="Meal Metrics"
    position="0 0.5 -2.75"
    align="center"
    color="#79beff"
    width="2">
  </a-text>

  <a-text
    id="metrics"
    value="Calories: --\nProtein: --\nReward: --\nWaste Risk: --"
    position="0 0.1 -2.74"
    align="center"
    color="#ffffff"
    width="3"
    wrap-count="32">
  </a-text>

  <!-- Labels -->
  <a-plane
    position="0 -0.7 -2.78"
    width="3.45"
    height="1.02"
    color="#050d18">
  </a-plane>

  <a-text
    value="AI Labels"
    position="0 -0.28 -2.75"
    align="center"
    color="#79beff"
    width="1.8">
  </a-text>

  <a-text
    id="result"
    value="No analysis yet."
    position="0 -0.82 -2.74"
    align="center"
    color="#ffffff"
    width="3"
    wrap-count="34">
  </a-text>

  <!-- Bottom -->
  <a-plane
    position="0 -1.5 -2.77"
    width="2.6"
    height="0.24"

  <a-text

  <!-- Frame -->
  <a-box position="-2.05 0.38 -3.05" depth="0.16" height="2.55" width="0.12" color="#24406c"></a-box>
  <a-box position="2.05 0.38 -3.05" depth="0.16" height="2.55" width="0.12" color="#24406c"></a-box>
  <a-box position="0 2.56 -3.05" depth="0.16" height="0.08" width="4.2" color="#24406c"></a-box>
  <a-box position="0 -1.78 -3.05" depth="0.2" height="0.1" width="4.35" color="#24406c"></a-box>

</a-scene>

<script>
async function analyzeImage() {
  const status = document.getElementById("status");
  const meal = document.getElementById("meal");
  const metrics = document.getElementById("metrics");
  const result = document.getElementById("result");
  const file = document.getElementById("imageInput").files[0];

  if (!file) {
    status.setAttribute("value", "STATUS: No image selected");
    meal.setAttribute("value", "Please choose an image.");
    metrics.setAttribute("value", "Calories: --\nProtein: --\nReward: --\nWaste Risk: --");
    result.setAttribute("value", "Waiting for input.");
    return;
  }

  status.setAttribute("value", "STATUS: Analyzing meal...");
  meal.setAttribute("value", "Scanning...");
  metrics.setAttribute("value", "Calculating...\nCalculating...\nCalculating...\nCalculating...");
  result.setAttribute("value", "AI is processing the uploaded image.");

  try {
    const base64 = await toBase64(file);

    const res = await fetch("https://vision.googleapis.com/v1/images:annotate?key=AIzaSyD6CJ45RiftcqFDNjIjskTKk2PiHWZ_TPQ", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({
        requests: [{
          image: { content: base64 },
          features: [{ type: "LABEL_DETECTION", maxResults: 5 }]
        }]
      })
    });

    const data = await res.json();

    if (!res.ok) {
      status.setAttribute("value", "STATUS: Error");
      meal.setAttribute("value", "Analysis failed");
      metrics.setAttribute("value", "Calories: --\nProtein: --\nReward: --\nWaste Risk: --");
      result.setAttribute("value", data.error?.message || "Unknown error");
      return;
    }

    const labels = data?.responses?.[0]?.labelAnnotations || [];

    if (!labels.length) {
      status.setAttribute("value", "STATUS: No labels found");
      meal.setAttribute("value", "Meal not recognized");
      metrics.setAttribute("value", "Calories: --\nProtein: --\nReward: --\nWaste Risk: --");
      result.setAttribute("value", "Try another image.");
      return;
    }

    const mealData = inferMealData(labels.map(l => l.description));

    const resultText = labels
      .slice(0,4)
      .map((l,i) => `${i+1}. ${l.description} (${Math.round((l.score||0)*100)}%)`)
      .join("\n");

    status.setAttribute("value", "STATUS: Analysis complete");
    meal.setAttribute("value", mealData.name);
    metrics.setAttribute(
      "value",
      `Calories: ${mealData.calories}\nProtein: ${mealData.protein}\nReward: ${mealData.reward}\nWaste Risk: ${mealData.wasteRisk}`
    );
    result.setAttribute("value", resultText);

  } catch (err) {
    status.setAttribute("value", "STATUS: Request failed");
    meal.setAttribute("value", "Unable to analyze");
    metrics.setAttribute("value", "Calories: --\nProtein: --\nReward: --\nWaste Risk: --");
    result.setAttribute("value", err.message);
  }
}

function inferMealData(labels) {
  const text = labels.join(" ").toLowerCase();

  if (text.includes("rice") && (text.includes("chicken") || text.includes("meat"))) {
    return { name:"Chicken Rice", calories:"520 kcal", protein:"35g", reward:"+50 Miles", wasteRisk:"Low" };
  }
  if (text.includes("salad") || (text.includes("vegetable") && text.includes("food"))) {
    return { name:"Salad Bowl", calories:"250 kcal", protein:"10g", reward:"+35 Miles", wasteRisk:"Medium" };
  }
  if (text.includes("pasta") || text.includes("noodle")) {
    return { name:"Pasta Dish", calories:"480 kcal", protein:"18g", reward:"+40 Miles", wasteRisk:"Medium" };
  }
  if (text.includes("sandwich") || text.includes("burger")) {
    return { name:"Sandwich / Burger", calories:"560 kcal", protein:"25g", reward:"+45 Miles", wasteRisk:"Medium" };
  }
  if (text.includes("dessert") || text.includes("cake")) {
    return { name:"Dessert", calories:"320 kcal", protein:"5g", reward:"+20 Miles", wasteRisk:"High" };
  }

  return { name:"Mixed Meal", calories:"400 kcal", protein:"20g", reward:"+30 Miles", wasteRisk:"Medium" };
}

function toBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(",")[1]);
    reader.onerror = err => reject(err);
    reader.readAsDataURL(file);
  });
}
</script>

</body>
