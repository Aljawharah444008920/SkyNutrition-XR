<<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SkyNutrition XR — Hologram Demo</title>

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://unpkg.com/aframe-troika-text/dist/aframe-troika-text.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    * { box-sizing: border-box; font-family: "Inter", sans-serif; }

    body {
      margin: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at 20% 10%, rgba(124,58,237,.18), transparent 22%),
        radial-gradient(circle at 80% 18%, rgba(56,189,248,.14), transparent 22%),
        radial-gradient(circle at 50% 0%, #183c6d 0%, #0a1730 40%, #050b15 100%);
    }

    .overlay {
      position: fixed;
      top: 18px;
      left: 18px;
      width: 390px;
      padding: 22px;
      border-radius: 26px;
      background: linear-gradient(180deg, rgba(9,18,36,.90), rgba(6,12,24,.86));
      border: 1px solid rgba(116,227,255,.16);
      box-shadow: 0 24px 60px rgba(0,0,0,.42);
      backdrop-filter: blur(16px);
      color: #f8fbff;
      z-index: 20;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: #dbf2ff;
      background: linear-gradient(90deg, rgba(56,189,248,.18), rgba(124,58,237,.18));
      border: 1px solid rgba(116,227,255,.14);
    }

    .title {
      margin: 16px 0 10px;
      font-size: 58px;
      line-height: .92;
      letter-spacing: -2.6px;
      font-weight: 800;
      background: linear-gradient(180deg, #ffffff 0%, #d9ecff 60%, #9ad8ff 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .sub {
      margin: 0;
      color: #dbeafe;
      font-size: 17px;
      line-height: 1.55;
      max-width: 330px;
    }

    .panel {
      margin-top: 18px;
      padding: 14px;
      border-radius: 18px;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.07);
    }

    input, button {
      width: 100%;
      border: none;
      border-radius: 15px;
      font-size: 16px;
      box-sizing: border-box;
    }

    input {
      margin-top: 4px;
      padding: 14px;
      background: #ffffff;
      color: #111827;
    }

    button {
      margin-top: 10px;
      padding: 14px;
      font-weight: 700;
      color: white;
      cursor: pointer;
      transition: transform .18s ease, filter .18s ease;
    }

    button:hover {
      transform: translateY(-1px);
      filter: brightness(1.03);
    }

    .primary {
      background: linear-gradient(90deg, #5ee7ff, #4f7cff);
      box-shadow: 0 14px 28px rgba(59,130,246,.28);
    }

    .secondary {
      background: linear-gradient(90deg, #272f44, #3c4761);
    }

    .hint {
      margin-top: 12px;
      padding: 11px 12px;
      border-radius: 14px;
      color: #d9efff;
      background: rgba(116,227,255,.07);
      border: 1px solid rgba(116,227,255,.10);
      font-size: 13px;
      line-height: 1.45;
      min-height: 44px;
    }
  </style>
</head>
<body>

<div class="overlay" id="overlayUI">
  <div class="eyebrow">XR Premium Judge Demo</div>
  <div class="title">SkyNutrition XR</div>
  <p class="sub">
    Upload a meal image, prepare the AI result, then launch the immersive hologram scan experience.
  </p>

  <div class="panel">
    <input type="file" id="imageInput" accept="image/*" />
    <button class="primary" onclick="prepareAnalysis()">Analyze & Prepare XR</button>
    <button class="secondary" onclick="enterXRMode()">Enter XR</button>
    <div class="hint" id="prepareState">Waiting for meal image.</div>
  </div>
</div>

<script>
  const API_KEY = "AIzaSyD6CJ45RiftcqFDNjIjskTKk2PiHWZ_TPQ";
  let preparedAnalysis = null;

  const overlayUI = document.getElementById("overlayUI");
  const prepareState = document.getElementById("prepareState");

  const startScanBtn = document.getElementById("startScanBtn");
  const scanRing = document.getElementById("scanRing");
  const scanRing2 = document.getElementById("scanRing2");
  const scanBeam = document.getElementById("scanBeam");
  const scanGlow = document.getElementById("scanGlow");
  const mealImage = document.getElementById("mealImage");
  const mealImageGlow = document.getElementById("mealImageGlow");

  const scanStateText = document.getElementById("scanStateText");
  const mealTitleText = document.getElementById("mealTitleText");
  const caloriesText = document.getElementById("caloriesText");
  const proteinText = document.getElementById("proteinText");
  const rewardText = document.getElementById("rewardText");
  const riskText = document.getElementById("riskText");

  const detailsBtn = document.getElementById("detailsBtn");
  const detailsBtnText = document.getElementById("detailsBtnText");
  const againBtn = document.getElementById("againBtn");
  const againBtnText = document.getElementById("againBtnText");
  const detailsCard = document.getElementById("detailsCard");
  const detailsText = document.getElementById("detailsText");

  function tSet(el, value, position, color, size, fontUrl, maxWidth) {
    el.setAttribute(
      "troika-text",
      `value: ${value}; position: ${position}; align: center; color: ${color}; fontSize: ${size}; font: ${fontUrl}; maxWidth: ${maxWidth};`
    );
  }

  function setState(value) {
    tSet(
      scanStateText,
      value,
      "0 0.10 -2.16",
      "#eef8ff",
      "0.060",
      "https://cdn.jsdelivr.net/npm/@fontsource/inter/files/inter-latin-600-normal.woff",
      "1.85"
    );
  }

  async function prepareAnalysis() {
    const file = document.getElementById("imageInput").files[0];

    if (!file) {
      alert("Please choose an image first.");
      return;
    }

    prepareState.textContent = "Preparing AI analysis...";
    setState("Preparing AI analysis...");
    hideResultSections();

    try {
      const base64 = await toBase64(file);
      const imageUrl = URL.createObjectURL(file);

      const res = await fetch(`https://vision.googleapis.com/v1/images:annotate?key=${API_KEY}`, {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
          requests: [{
            image: { content: base64 },
            features: [
              { type: "LABEL_DETECTION", maxResults: 5 },
              { type: "OBJECT_LOCALIZATION", maxResults: 3 }
            ]
          }]
        })
      });

      const data = await res.json();

      if (!res.ok) {
        prepareState.textContent = "AI preparation failed.";
        setState("AI preparation failed");
        alert(data.error?.message || "Vision API error");
        return;
      }

      const labels = data?.responses?.[0]?.labelAnnotations || [];
      if (!labels.length) {
        prepareState.textContent = "No meal detected.";
        setState("No meal detected");
        alert("No labels found. Try another image.");
        return;
      }

      const mealData = inferMealData(labels.map(l => l.description));
      const labelsText = labels
        .slice(0, 4)
        .map((l, i) => `${i + 1}. ${l.description} (${Math.round((l.score || 0) * 100)}%)`)
        .join("\n");

      preparedAnalysis = {
        name: mealData.name,
        calories: mealData.calories,
        protein: mealData.protein,
        reward: mealData.reward,
        wasteRisk: mealData.wasteRisk,
        labels: labelsText,
        imageUrl
      };

      prepareState.textContent = "AI ready. Enter XR and start scan.";
      setState("AI ready. Enter XR and start scan.");
    } catch (err) {
      prepareState.textContent = "Request failed.";
      setState("Request failed");
      alert(err.message);
    }
  }

  function enterXRMode() {
    overlayUI.style.display = "none";
    const scene = document.querySelector("a-scene");
    if (scene.enterVR) scene.enterVR();
  }

  startScanBtn.addEventListener("click", () => {
    if (!preparedAnalysis) {
      setState("Please analyze first");
      return;
    }

    hideResultSections();
    startScanBtn.setAttribute("visible", false);

    scanRing.setAttribute("visible", true);
    scanRing2.setAttribute("visible", true);
    scanBeam.setAttribute("visible", true);
    scanGlow.setAttribute("visible", true);
    mealImageGlow.setAttribute("visible", true);

    setState("Detecting meal...");

    setTimeout(() => setState("Analyzing nutrition..."), 650);
    setTimeout(() => setState("Calculating reward..."), 1350);

    setTimeout(() => {
      scanRing.setAttribute("visible", false);
      scanRing2.setAttribute("visible", false);
      scanBeam.setAttribute("visible", false);
      scanGlow.setAttribute("visible", false);
      showPreparedResult();
    }, 2200);
  });

  detailsBtn.addEventListener("click", () => {
    const visible = detailsCard.getAttribute("visible");
    detailsCard.setAttribute("visible", !visible);
    detailsText.setAttribute("visible", !visible);
  });

  againBtn.addEventListener("click", () => {
    hideResultSections();
    mealImage.setAttribute("visible", false);
    mealImageGlow.setAttribute("visible", false);
    startScanBtn.setAttribute("visible", true);
    setState("Ready for scan");
  });

  function showPreparedResult() {
    mealImage.setAttribute("src", preparedAnalysis.imageUrl);
    mealImage.setAttribute("visible", true);

    mealTitleText.setAttribute("visible", true);
    caloriesText.setAttribute("visible", true);
    proteinText.setAttribute("visible", true);
    rewardText.setAttribute("visible", true);
    riskText.setAttribute("visible", true);

    tSet(
      mealTitleText,
      preparedAnalysis.name,
      "0 -0.42 -2.12",
      "#ffffff",
      "0.095",
      "https://cdn.jsdelivr.net/npm/@fontsource/orbitron/files/orbitron-latin-700-normal.woff",
      "2.0"
    );

    tSet(
      caloriesText,
      preparedAnalysis.calories,
      "0 1.00 -2.04",
      "#f8fbff",
      "0.055",
      "https://cdn.jsdelivr.net/npm/@fontsource/inter/files/inter-latin-700-normal.woff",
      "0.75"
    );

    tSet(
      proteinText,
      `Protein\n${preparedAnalysis.protein}`,
      "-0.92 0.66 -2.06",
      "#8fdcff",
      "0.052",
      "https://cdn.jsdelivr.net/npm/@fontsource/inter/files/inter-latin-700-normal.woff",
      "0.75"
    );

    tSet(
      rewardText,
      preparedAnalysis.reward,
      "0.92 0.66 -2.06",
      "#f5c96b",
      "0.052",
      "https://cdn.jsdelivr.net/npm/@fontsource/inter/files/inter-latin-700-normal.woff",
      "0.75"
    );

    tSet(
      riskText,
      preparedAnalysis.wasteRisk,
      "0 0.18 -2.05",
      "#d5dfff",
      "0.052",
      "https://cdn.jsdelivr.net/npm/@fontsource/inter/files/inter-latin-700-normal.woff",
      "0.75"
    );

    tSet(
      detailsText,
      preparedAnalysis.labels,
      "0 -1.69 -2.20",
      "#a9dcff",
      "0.050",
      "https://cdn.jsdelivr.net/npm/@fontsource/inter/files/inter-latin-500-normal.woff",
      "1.95"
    );

    detailsBtn.setAttribute("visible", true);
    detailsBtnText.setAttribute("visible", true);
    againBtn.setAttribute("visible", true);
    againBtnText.setAttribute("visible", true);

    setState("Analysis complete");
  }

  function hideResultSections() {
    mealTitleText.setAttribute("visible", false);
    caloriesText.setAttribute("visible", false);
    proteinText.setAttribute("visible", false);
    rewardText.setAttribute("visible", false);
    riskText.setAttribute("visible", false);

    detailsBtn.setAttribute("visible", false);
    detailsBtnText.setAttribute("visible", false);
    againBtn.setAttribute("visible", false);
    againBtnText.setAttribute("visible", false);

    detailsCard.setAttribute("visible", false);
    detailsText.setAttribute("visible", false);
  }

  function inferMealData(labels) {
    const text = labels.join(" ").toLowerCase();

    if (text.includes("rice") && (text.includes("chicken") || text.includes("meat"))) {
      return { name:"Chicken Rice", calories:"520 kcal", protein:"35g", reward:"+50 Miles", wasteRisk:"Low Risk" };
    }
