<<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SkyNutrition XR - Judge Demo</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      overflow: hidden;
      background: radial-gradient(circle at top, #12305a 0%, #071a2f 60%, #040b18 100%);
    }

    .overlay {
      position: fixed;
      top: 20px;
      left: 20px;
      width: 360px;
      padding: 22px;
      border-radius: 22px;
      background: linear-gradient(180deg, rgba(9,22,48,0.96), rgba(6,14,28,0.95));
      color: white;
      z-index: 10;
      box-shadow: 0 16px 40px rgba(0,0,0,0.35);
      border: 1px solid rgba(124,173,255,0.16);
      backdrop-filter: blur(10px);
    }

    .badge {
      display: inline-block;
      margin-bottom: 14px;
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 12px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #bcd8ff;
      background: rgba(59,130,246,0.16);
    }

    .overlay h2 {
      margin: 0 0 12px 0;
      font-size: 42px;
      line-height: 1;
    }

    .overlay p {
      margin: 0 0 16px 0;
      font-size: 16px;
      line-height: 1.5;
      color: #dbeafe;
    }

    .input-wrap {
      margin-top: 18px;
      padding: 14px;
      border-radius: 16px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
    }

    input, button {
      width: 100%;
      margin-top: 10px;
      padding: 12px;
      border-radius: 12px;
      border: none;
      box-sizing: border-box;
      font-size: 16px;
    }

    input {
      background: white;
      color: #111827;
    }

    button {
      background: linear-gradient(90deg,#7cc7ff,#3b82f6);
      color: white;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 10px 22px rgba(59,130,246,0.25);
    }

    .secondary-btn {
      background: linear-gradient(90deg,#334155,#475569);
    }

    .note {
      margin-top: 14px;
      font-size: 13px;
      color: #9fc5ff;
    }
  </style>
</head>
<body>

<div class="overlay">
  <div class="badge">Final Judge Demo</div>
  <h2>SkyNutrition XR</h2>
  <p>Upload a meal image, analyze it with AI, then enter the immersive XR scan experience.</p>

  <div class="input-wrap">
    <input type="file" id="imageInput" accept="image/*">
    <button onclick="prepareAnalysis()">Analyze & Prepare XR</button>
    <button class="secondary-btn" onclick="enterVRMode()">Enter VR</button>
  </div>

  <div class="note">Flow: upload → analyze → enter VR → press Start Scan.</div>
</div>

<a-scene background="color: #06101f">

  <!-- Camera -->
  <a-entity position="0 1.6 0">
    <a-camera>
      <a-cursor color="#9dd6ff" fuse="false"></a-cursor>
    </a-camera>
  </a-entity>

  <a-sky color="#06101f"></a-sky>

  <!-- Background ambience -->
  <a-plane position="0 3 -7" width="20" height="9" color="#11284f" opacity="0.22"></a-plane>
  <a-plane position="-4.8 1.8 -6" width="3.2" height="5.8" color="#12305e" opacity="0.10"></a-plane>
  <a-plane position="4.8 1.8 -6" width="3.2" height="5.8" color="#12305e" opacity="0.10"></a-plane>

  <!-- Animated airplane -->
  <a-entity position="-4.9 2.55 -5.2"
            animation="property: position; to: 4.9 2.85 -5.2; dur: 6500; easing: linear; loop: true">
    <a-cylinder position="0 0 0" radius="0.11" height="1.25" rotation="90 0 0" color="#ffffff"></a-cylinder>
    <a-box position="0 0 0" width="1.3" height="0.04" depth="0.22" color="#8dc6ff"></a-box>
    <a-box position="0 0 -0.43" width="0.35" height="0.03" depth="0.08" color="#8dc6ff"></a-box>
    <a-box position="0 0.18 -0.43" width="0.08" height="0.22" depth="0.04" color="#8dc6ff"></a-box>
    <a-sphere position="0 0 0.62" radius="0.11" color="#ffffff"></a-sphere>
  </a-entity>

  <!-- Logo header -->
  <a-plane position="0 2.95 -2.55" width="4.3" height="1.0" color="#10284d" opacity="0.98"></a-plane>
  <a-plane position="0 3.35 -2.53" width="3.7" height="0.06" color="#79beff" opacity="0.95"
           animation="property: opacity; from: 0.45; to: 1; dir: alternate; dur: 1300; loop: true">
  </a-plane>

  <a-plane position="-1.2 2.9 -2.52" width="1.75" height="0.56" color="#ffffff"></a-plane>
  <a-image src="assets/saudi.png" position="-1.2 2.9 -2.51" width="1.58" height="0.31"></a-image>

  <a-plane position="0 2.9 -2.50" width="0.02" height="0.72" color="#8cccff" opacity="0.7"></a-plane>

  <a-plane position="1.2 2.9 -2.52" width="1.75" height="0.56" color="#ffffff"></a-plane>
  <a-image src="assets/kacst.png" position="1.2 2.9 -2.51" width="1.58" height="0.42"></a-image>

  <!-- Main experience panel -->
  <a-plane
    id="mainPanel"
    position="0 1.18 -2.28"
    width="3.25"
    height="2.02"
    color="#0c1f3f"
    opacity="0.98"
    animation="property: scale; from: 0.88 0.88 0.88; to: 1 1 1; dur: 800; easing: easeOutCubic">
  </a-plane>

  <a-plane position="0 1.97 -2.26" width="2.85" height="0.07" color="#79beff" opacity="0.95"></a-plane>

  <a-text
    value="SkyNutrition XR"
    position="0 1.70 -2.22"
    align="center"
    color="#ffffff"
    width="3.4"
    font="mozillavr">
  </a-text>

  <a-text
    value="AI-powered inflight meal intelligence"
    position="0 1.48 -2.22"
    align="center"
    color="#8cccff"
    width="2.3"
    wrap-count="30"
    font="mozillavr">
  </a-text>

  <!-- Start scan button -->
  <a-plane id="startScanBtn"
           position="0 1.10 -2.20"
           width="1.55"
           height="0.34"
           color="#3b82f6"
           class="clickable"
           text="value: Start Scan; align: center; color: white; width: 3"
           animation__hover="property: scale; startEvents: mouseenter; to: 1.08 1.08 1.08; dur: 180"
           animation__leave="property: scale; startEvents: mouseleave; to: 1 1 1; dur: 180">
  </a-plane>

  <!-- Scan ring -->
  <a-ring id="scanRing"
          position="0 0.66 -2.18"
          radius-inner="0.18"
          radius-outer="0.26"
          color="#00cfff"
          visible="false"
          animation="property: rotation; to: 0 0 360; loop: true; dur: 1000">
  </a-ring>

  <!-- Scan pulse -->
  <a-plane id="scanPulse"
           position="0 0.66 -2.19"
           width="0.48"
           height="0.48"
           color="#7dd3fc"
           opacity="0.0"
           visible="false"
           animation="property: opacity; from: 0.0; to: 0.25; dir: alternate; dur: 500; loop: true">
  </a-plane>

  <!-- State text -->
  <a-text id="scanState"
          value="Ready for scan"
          position="0 0.18 -2.18"
          align="center"
          color="#e5f1ff"
          width="2.2"
          wrap-count="28"
          font="mozillavr">
  </a-text>

  <!-- Result card -->
  <a-plane id="resultCard"
           position="0 -0.52 -2.20"
           width="2.75"
           height="1.05"
           color="#08111f"
           opacity="0.97"
           visible="false">
  </a-plane>

  <a-text id="meal"
          value=""
          position="0 -0.18 -2.15"
          align="center"
          color="#ffffff"
          width="2.35"
          wrap-count="24"
          visible="false"
          font="mozillavr">
  </a-text>

  <a-text id="metrics"
          value=""
          position="0 -0.70 -2.15"
          align="center"
          color="#7dd3fc"
          width="2.15"
          wrap-count="28"
          visible="false"
          font="mozillavr">
  </a-text>

  <!-- Buttons after result -->
  <a-plane id="detailsBtn"
           position="-0.66 -1.28 -2.18"
           width="1.05"
           height="0.24"
           color="#1d4ed8"
           visible="false"
           class="clickable"
           text="value: AI Details; align: center; color: white; width: 2.1">
  </a-plane>

  <a-plane id="againBtn"
           position="0.66 -1.28 -2.18"
           width="1.05"
           height="0.24"
           color="#16a34a"
           visible="false"
           class="clickable"
           text="value: Scan Again; align: center; color: white; width: 2.1">
  </a-plane>

  <!-- AI details card -->
  <a-plane id="detailsCard"
           position="0 -1.88 -2.22"
           width="2.75"
           height="0.58"
           color="#06101d"
           visible="false">
  </a-plane>

  <a-text id="result"
          value=""
          position="0 -1.90 -2.18"
          align="center"
          color="#9dd6ff"
          width="2.25"
          wrap-count="28"
          visible="false"
          font="mozillavr">
  </a-text>

</a-scene>

<script>
  const API_KEY = "AIzaSyD6CJ45RiftcqFDNjIjskTKk2PiHWZ_TPQ";

  let preparedAnalysis = null;

  const startScanBtn = document.getElementById("startScanBtn");
  const scanRing = document.getElementById("scanRing");
  const scanPulse = document.getElementById("scanPulse");
  const scanState = document.getElementById("scanState");
  const resultCard = document.getElementById("resultCard");
  const mealEl = document.getElementById("meal");
  const metricsEl = document.getElementById("metrics");
  const resultEl = document.getElementById("result");
  const detailsCard = document.getElementById("detailsCard");
  const detailsBtn = document.getElementById("detailsBtn");
  const againBtn = document.getElementById("againBtn");

  async function prepareAnalysis() {
    const file = document.getElementById("imageInput").files[0];

    if (!file) {
      alert("Please choose an image first.");
      return;
    }

    scanState.setAttribute("value", "Preparing AI analysis...");
    hideResultSections();

    try {
      const base64 = await toBase64(file);

      const res = await fetch(`https://vision.googleapis.com/v1/images:annotate?key=${API_KEY}`, {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
          requests: [{
            image: { content: base64 },
            features: [{ type: "LABEL_DETECTION", maxResults: 5 }]
          }]
        })
      });

      const data = await res.json();

      if (!res.ok) {
        scanState.setAttribute("value", "AI preparation failed");
        alert(data.error?.message || "Vision API error");
        return;
      }

      const labels = data?.responses?.[0]?.labelAnnotations || [];

      if (!labels.length) {
        scanState.setAttribute("value", "No meal detected");
        alert("No labels found. Try another image.");
        return;
      }

      const mealData = inferMealData(labels.map(l => l.description));
      const labelsText = labels
        .slice(0, 4)
        .map((l, i) => `${i + 1}. ${l.description} (${Math.round((l.score || 0) * 100)}%)`)
        .join("\n");

      preparedAnalysis = {
        name: mealData.name,
        calories: mealData.calories,
        protein: mealData.protein,
        reward: mealData.reward,
        wasteRisk: mealData.wasteRisk,
        labels: labelsText
      };

      scanState.setAttribute("value", "AI ready. Enter VR and press Start Scan.");

    } catch (err) {
      scanState.setAttribute("value", "Request failed");
      alert(err.message);
    }
  }

  function enterVRMode() {
    const scene = document.querySelector("a-scene");
    if (scene.enterVR) {
      scene.enterVR();
    }
  }

  startScanBtn.addEventListener("click", () => {
    if (!preparedAnalysis) {
      scanState.setAttribute("value", "Please analyze first.");
      return;
    }

    hideResultSections();
    startScanBtn.setAttribute("visible", false);
    scanRing.setAttribute("visible", true);
    scanPulse.setAttribute("visible", true);

    scanState.setAttribute("value", "Detecting meal...");

    setTimeout(() => {
      scanState.setAttribute("value", "Analyzing nutrition...");
    }, 700);

    setTimeout(() => {
      scanState.setAttribute("value", "Calculating reward...");
    }, 1400);

    setTimeout(() => {
      scanRing.setAttribute("visible", false);
      scanPulse.setAttribute("visible", false);
      showPreparedResult();
    }, 2200);
  });

  detailsBtn.addEventListener("click", () => {
    const visible = detailsCard.getAttribute("visible");
    detailsCard.setAttribute("visible", !visible);
    resultEl.setAttribute("visible", !visible);
  });

  againBtn.addEventListener("click", () => {
    hideResultSections();
    startScanBtn.setAttribute("visible", true);
    scanState.setAttribute("value", "Ready for scan");
  });

  function showPreparedResult() {
    resultCard.setAttribute("visible", true);
    mealEl.setAttribute("visible", true);
    metricsEl.setAttribute("visible", true);
    detailsBtn.setAttribute("visible", true);
    againBtn.setAttribute("visible", true);

    mealEl.setAttribute("value", preparedAnalysis.name);
    metricsEl.setAttribute(
      "value",
      `Calories: ${preparedAnalysis.calories}\nProtein: ${preparedAnalysis.protein}\nReward: ${preparedAnalysis.reward}\nRisk: ${preparedAnalysis.wasteRisk}`
    );

    resultEl.setAttribute("value", preparedAnalysis.labels);
    scanState.setAttribute("value", "Analysis complete");
  }

  function hideResultSections() {
    resultCard.setAttribute("visible", false);
    mealEl.setAttribute("visible", false);
    metricsEl.setAttribute("visible", false);
    detailsBtn.setAttribute("visible", false);
    againBtn.setAttribute("visible", false);
    detailsCard.setAttribute("visible", false);
    resultEl.setAttribute("visible", false);
  }

  function inferMealData(labels) {
    const text = labels.join(" ").toLowerCase();

    if (text.includes("rice") && (text.includes("chicken") || text.includes("meat"))) {
      return { name:"Chicken Rice", calories:"520 kcal", protein:"35g", reward:"+50 Miles", wasteRisk:"Low" };
    }
    if (text.includes("salad") || (text.includes("vegetable") && text.includes("food"))) {
      return { name:"Salad Bowl", calories:"250 kcal", protein:"10g", reward:"+35 Miles", wasteRisk:"Medium" };
    }
    if (text.includes("pasta") || text.includes("noodle")) {
      return { name:"Pasta Dish", calories:"480 kcal", protein:"18g", reward:"+40 Miles", wasteRisk:"Medium" };
    }
    if (text.includes("sandwich") || text.includes("burger")) {
      return { name:"Sandwich / Burger", calories:"560 kcal", protein:"25g", reward:"+45 Miles", wasteRisk:"Medium" };
    }
    if (text.includes("dessert") || text.includes("cake")) {
      return { name:"Dessert", calories:"320 kcal", protein:"5g", reward:"+20 Miles", wasteRisk:"High" };
    }

    return { name:"Mixed Meal", calories:"400 kcal", protein:"20g", reward:"+30 Miles", wasteRisk:"Medium" };
  }

  function toBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result.split(",")[1]);
      reader.onerror = err => reject(err);
      reader.readAsDataURL(file);
    });
  }
</script>

</body>
</html>
