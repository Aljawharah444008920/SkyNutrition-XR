<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkyNutrition XR - Full VR</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
</head>
<body>
<a-scene background="color: #06101f">

  <!-- Camera -->
  <a-entity position="0 1.6 0">
    <a-camera>
      <a-cursor color="#7cc7ff"></a-cursor>
    </a-camera>
  </a-entity>

  <a-sky color="#06101f"></a-sky>

  <!-- Background ambience -->
  <a-plane position="0 3 -7" width="20" height="9" color="#11284f" opacity="0.22"></a-plane>
  <a-plane position="-4.5 1.7 -6" width="3" height="5.5" color="#12305e" opacity="0.10"></a-plane>
  <a-plane position="4.5 1.7 -6" width="3" height="5.5" color="#12305e" opacity="0.10"></a-plane>

  <!-- Animated airplane -->
  <a-entity position="-4.8 2.7 -5.5"
            animation="property: position; to: 4.8 2.95 -5.5; dur: 7000; easing: linear; loop: true">

    <a-cylinder position="0 0 0" radius="0.11" height="1.3" rotation="90 0 0" color="#ffffff"></a-cylinder>
    <a-box position="0 0 0" width="1.35" height="0.04" depth="0.22" color="#8dc6ff"></a-box>
    <a-box position="0 0 -0.45" width="0.35" height="0.03" depth="0.08" color="#8dc6ff"></a-box>
    <a-box position="0 0.18 -0.45" width="0.08" height="0.24" depth="0.04" color="#8dc6ff"></a-box>
    <a-sphere position="0 0 0.65" radius="0.11" color="#ffffff"></a-sphere>
  </a-entity>

  <!-- Logo header -->
  <a-plane position="0 3.15 -3.15" width="4.8" height="1.12" color="#0f2448" opacity="0.98"></a-plane>
  <a-plane position="0 3.62 -3.12" width="4.15" height="0.06" color="#79beff" opacity="0.95"
           animation="property: opacity; from: 0.45; to: 1; dir: alternate; dur: 1300; loop: true">
  </a-plane>

  <!-- Saudi card -->
  <a-plane position="-1.35 3.1 -3.1" width="1.95" height="0.62" color="#ffffff" opacity="1"></a-plane>
  <a-image src="assets/saudi.png" position="-1.35 3.1 -3.08" width="1.75" height="0.34"></a-image>

  <!-- Divider -->
  <a-plane position="0 3.1 -3.07" width="0.02" height="0.78" color="#8cccff" opacity="0.7"></a-plane>

  <!-- KACST card -->
  <a-plane position="1.35 3.1 -3.1" width="1.95" height="0.62" color="#ffffff" opacity="1"></a-plane>
  <a-image src="assets/kacst.png" position="1.35 3.1 -3.08" width="1.75" height="0.46"></a-image>

  <!-- Main panel -->
  <a-plane position="0 1.25 -3.1" width="4.45" height="3.4" color="#0d1f3f" opacity="0.99"
           animation="property: position; from: 0 0.4 -3.1; to: 0 1.25 -3.1; dur: 1100; easing: easeOutCubic">
  </a-plane>

  <!-- Accent -->
  <a-plane position="0 2.55 -3.07" width="3.95" height="0.08" color="#79beff" opacity="0.95"></a-plane>

  <!-- Titles -->
  <a-text value="SKYNUTRITION XR"
          position="0 2.15 -3.0"
          align="center"
          color="#ffffff"
          width="5.2"
          font="mozillavr">
  </a-text>

  <a-text value="Inflight Meal Intelligence"
          position="0 1.88 -3.0"
          align="center"
          color="#8cccff"
          width="3.5"
          font="mozillavr">
  </a-text>

  <!-- Status -->
  <a-plane position="0 1.48 -2.99" width="3.6" height="0.34" color="#17315f"></a-plane>
  <a-text id="status"
          value="STATUS: Ready to scan"
          position="0 1.48 -2.95"
          align="center"
          color="#e5f1ff"
          width="3.3"
          wrap-count="40"
          font="mozillavr">
  </a-text>

  <!-- Meal -->
  <a-plane position="0 1.0 -2.98" width="3.6" height="0.44" color="#0a162a"></a-plane>
  <a-text value="Detected Meal"
          position="0 1.14 -2.95"
          align="center"
          color="#79beff"
          width="2.1"
          font="mozillavr">
  </a-text>

  <a-text id="meal"
          value="Awaiting selection..."
          position="0 0.88 -2.94"
          align="center"
          color="#ffffff"
          width="3.1"
          wrap-count="30"
          font="mozillavr">
  </a-text>

  <!-- Metrics -->
  <a-plane position="0 0.3 -2.98" width="3.6" height="0.84" color="#08111f"></a-plane>
  <a-text value="Meal Metrics"
          position="0 0.62 -2.95"
          align="center"
          color="#79beff"
          width="2.1"
          font="mozillavr">
  </a-text>

  <a-text id="metrics"
          value="Calories: --\nProtein: --\nReward: --\nWaste Risk: --"
          position="0 0.18 -2.94"
          align="center"
          color="#ffffff"
          width="3.1"
          wrap-count="34"
          font="mozillavr">
  </a-text>

  <!-- Components -->
  <a-plane position="0 -0.72 -2.98" width="3.6" height="1.0" color="#050d18"></a-plane>
  <a-text value="Key Components"
          position="0 -0.3 -2.95"
          align="center"
          color="#79beff"
          width="2"
          font="mozillavr">
  </a-text>

  <a-text id="components"
          value="No analysis yet."
          position="0 -0.82 -2.94"
          align="center"
          color="#ffffff"
          width="3.05"
          wrap-count="34"
          font="mozillavr">
  </a-text>

  <!-- Bottom label -->
  <a-plane position="0 -1.58 -2.97" width="2.75" height="0.24" color="#2f6ef0"></a-plane>
  <a-text value="ONBOARD SMART SERVICE"
          position="0 -1.58 -2.93"
          align="center"
          color="#ffffff"
          width="2.6"
          font="mozillavr">
  </a-text>

  <!-- Panel frame -->
  <a-box position="-2.1 0.38 -3.2" depth="0.16" height="2.8" width="0.12" color="#24406c"></a-box>
  <a-box position="2.1 0.38 -3.2" depth="0.16" height="2.8" width="0.12" color="#24406c"></a-box>
  <a-box position="0 2.65 -3.2" depth="0.16" height="0.08" width="4.3" color="#24406c"></a-box>
  <a-box position="0 -1.86 -3.2" depth="0.2" height="0.1" width="4.45" color="#24406c"></a-box>

  <!-- VR Buttons -->
  <a-entity position="0 -2.35 -2.8">

    <!-- Chicken Rice Button -->
    <a-box id="btnChicken"
           position="-1.35 0 0"
           width="1.25" height="0.38" depth="0.16"
           color="#2563eb"
           class="clickable"
           animation__hover="property: scale; startEvents: mouseenter; dir: alternate; dur: 200; to: 1.05 1.05 1.05"
           animation__leave="property: scale; startEvents: mouseleave; dur: 200; to: 1 1 1">
    </a-box>
    <a-text value="Demo Chicken Rice"
            position="-1.35 0 0.1"
            align="center"
            color="#ffffff"
            width="2.2"
            font="mozillavr">
    </a-text>

    <!-- Salad Button -->
    <a-box id="btnSalad"
           position="0 0 0"
           width="1.1" height="0.38" depth="0.16"
           color="#16a34a"
           class="clickable"
           animation__hover="property: scale; startEvents: mouseenter; dir: alternate; dur: 200; to: 1.05 1.05 1.05"
           animation__leave="property: scale; startEvents: mouseleave; dur: 200; to: 1 1 1">
    </a-box>
    <a-text value="Demo Salad"
            position="0 0 0.1"
            align="center"
            color="#ffffff"
            width="1.9"
            font="mozillavr">
    </a-text>

    <!-- Reset Button -->
    <a-box id="btnReset"
           position="1.35 0 0"
           width="1.0" height="0.38" depth="0.16"
           color="#475569"
           class="clickable"
           animation__hover="property: scale; startEvents: mouseenter; dir: alternate; dur: 200; to: 1.05 1.05 1.05"
           animation__leave="property: scale; startEvents: mouseleave; dur: 200; to: 1 1 1">
    </a-box>
    <a-text value="Reset"
            position="1.35 0 0.1"
            align="center"
            color="#ffffff"
            width="1.5"
            font="mozillavr">
    </a-text>

  </a-entity>

</a-scene>

<script>
  const statusEl = document.querySelector('#status');
  const mealEl = document.querySelector('#meal');
  const metricsEl = document.querySelector('#metrics');
  const componentsEl = document.querySelector('#components');

  function setChickenRice() {
    statusEl.setAttribute('value', 'STATUS: Analysis complete');
    mealEl.setAttribute('value', 'Chicken Rice');
    metricsEl.setAttribute(
      'value',
      'Calories: 520 kcal\nProtein: 35g\nReward: +50 Miles\nWaste Risk: Low'
    );
    componentsEl.setAttribute(
      'value',
      '1. Chicken\n2. Rice\n3. Vegetable\n4. Sauce'
    );
  }

  function setSalad() {
    statusEl.setAttribute('value', 'STATUS: Analysis complete');
    mealEl.setAttribute('value', 'Salad Bowl');
    metricsEl.setAttribute(
      'value',
      'Calories: 250 kcal\nProtein: 10g\nReward: +35 Miles\nWaste Risk: Medium'
    );
    componentsEl.setAttribute(
      'value',
      '1. Lettuce\n2. Tomato\n3. Cucumber\n4. Dressing'
    );
  }

  function resetPanel() {
    statusEl.setAttribute('value', 'STATUS: Ready to scan');
    mealEl.setAttribute('value', 'Awaiting selection...');
    metricsEl.setAttribute(
      'value',
      'Calories: --\nProtein: --\nReward: --\nWaste Risk: --'
    );
    componentsEl.setAttribute('value', 'No analysis yet.');
  }

  document.querySelector('#btnChicken').addEventListener('click', setChickenRice);
  document.querySelector('#btnSalad').addEventListener('click', setSalad);
  document.querySelector('#btnReset').addEventListener('click', resetPanel);
</script>
</body>
</html>
